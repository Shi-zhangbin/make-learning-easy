    text: '{colors.ink}'
    radius: '{rounded.lg}'
    padding: '{spacing.xl}'
  card_dark:
    bg: '{colors.surface_dark}'
    text: '{colors.on_dark}'
    radius: '{rounded.lg}'
    padding: '{spacing.xl}'
  card_code:
    bg: '{colors.surface_dark}'
    text: '{colors.on_dark}'
    radius: '{rounded.lg}'
    padding: '{spacing.lg}'
  badge:
    bg: '{colors.surface_card}'
    text: '{colors.ink}'
    radius: '{rounded.pill}'
    padding: 4px 12px
    font_size: '{typography.caption.size}'
    weight: 500
