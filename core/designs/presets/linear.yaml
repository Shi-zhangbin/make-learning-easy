    letter_spacing: -3px
  display_lg:
    size: 56px
    weight: 600
    line_height: 1.1
    letter_spacing: -1.8px
  display_md:
    size: 40px
    weight: 600
    line_height: 1.15
    letter_spacing: -1px
  display_sm:
    size: 28px
    weight: 600
    line_height: 1.2
    letter_spacing: -0.6px
  title_lg:
    size: 22px
    weight: 500
    line_height: 1.25
    letter_spacing: -0.4px
  title_md:
    size: 18px
    weight: 500
    line_height: 1.4
    letter_spacing: 0
  title_sm:
    size: 16px
    weight: 500
    line_height: 1.4
    letter_spacing: 0
  body_md:
    size: 16px
    weight: 400
    line_height: 1.5
    letter_spacing: -0.05px
  body_sm:
    size: 14px
    weight: 400
    line_height: 1.5
    letter_spacing: 0
  caption:
    size: 13px
    weight: 500
    line_height: 1.4
    letter_spacing: 0
  caption_uppercase:
    size: 12px
    weight: 500
    line_height: 1.4
    letter_spacing: 1.5px
  code:
    size: 14px
    weight: 400
    line_height: 1.6
