rounded:
  xs: 4px
  sm: 6px
  md: 8px
  lg: 12px
  xl: 16px
  pill: 9999px
spacing:
  xxs: 4px
  xs: 8px
  sm: 12px
  md: 16px
  lg: 24px
  xl: 32px
  xxl: 48px
  section: 96px
components:
  button_primary:
    bg: '{colors.primary}'
    text: '{colors.on_primary}'
    radius: '{rounded.md}'
    padding: 12px 20px
    height: 40px
  button_secondary:
    bg: '{colors.surface_2}'
    text: '{colors.ink}'
    radius: '{rounded.md}'
    padding: 12px 20px
    border: 1px solid {colors.hairline}
  card_feature:
    bg: '{colors.surface_2}'
    text: '{colors.ink}'
    radius: '{rounded.lg}'
    padding: '{spacing.xl}'
  card_dark:
    bg: '{colors.canvas}'
    text: '{colors.ink}'
    radius: '{rounded.lg}'
    padding: '{spacing.xl}'
    border: 1px solid {colors.hairline}
  card_code:
    bg: '{colors.canvas}'
    text: '{colors.ink}'
    radius: '{rounded.lg}'
    padding: '{spacing.lg}'
    border: 1px solid {colors.hairline}
  badge:
    bg: '{colors.surface_3}'
    text: '{colors.ink_muted}'
    radius: '{rounded.pill}'
    padding: 4px 12px
    font_size: '{typography.caption.size}'
  badge_accent:
    bg: '{colors.primary}'
    text: '{colors.on_primary}'
    radius: '{rounded.pill}'
    padding: 4px 12px
    font_size: '{typography.caption_uppercase.size}'
    letter_spacing: '{typography.caption_uppercase.letter_spacing}'
  page_number:
    color: '{colors.ink_tertiary}'
    size: 13px
    weight: 500
visual_style_guide: |
  设计分镜和配图描述时，采用极简线性风格。具体要求：
  1. 使用干净几何线条、低饱和色彩、深色背景的视觉语言
  2. 技术概念用抽象几何方式表达（比如：API用端点连线、数据流用光束）
  3. 每页像一帧极简UI界面，留白充足、视觉焦点集中
  4. 色调与 linear 风格色板协调（主色淡紫 #5e6ad2、近黑底 #010102）
  5. 避免卡通、写实、过度装饰风格

image_style: "极简线性风格，干净几何，深色背景"

imagegen_style_prefix: "minimalist line art style, clean geometric shapes, dark background, low saturation, lavender accent, abstract tech illustration"

layout_defaults:
  canvas_bg: '{colors.canvas}'
  content_bg: '{colors.surface_1}'
  card_bg: '{colors.surface_2}'
  code_bg: '{colors.canvas}'
  text_color: '{colors.ink}'
  heading_color: '{colors.ink}'
  body_color: '{colors.ink_muted}'
  muted_color: '{colors.ink_subtle}'
  accent_color: '{colors.primary}'
  border_color: '{colors.hairline}'
  page_number_color: '{components.page_number.color}'
  page_number_size: '{components.page_number.size}'
  font_family: sans-serif
  code_family: monospace
  heading_family: sans-serif
  body_family: sans-serif
