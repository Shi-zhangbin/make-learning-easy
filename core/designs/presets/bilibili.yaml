visual_style_guide: |
  设计分镜和配图描述时，采用日系二次元动漫风格。具体要求：
  1. image_slots 中的 prompt 描述必须指向 anime / 动漫绘画风格，禁止写实照片
  2. 参考新海诚/京都动画等视觉语言：柔和的线条、鲜艳但有层次的色彩、光影通透
  3. 人物（如有）使用二次元画风：大眼睛表情丰富、头发有光泽、肤色柔和
  4. 技术概念和抽象内容用动漫化方式表达（比如：数据流变成发光的魔法阵、Bug变成卖萌的小怪兽）
  5. 每页像一帧动画截图，有明确的视觉焦点和氛围感
  6. 背景用渐变天空/云彩/光晕等 anime 经典元素增强沉浸感
  7. 色调与 bilibili 风格色板协调（主色粉 #FB7299、辅助蓝 #00A1D6）
  8. 避免恐怖、血腥、恐怖谷等不适内容
  9. 参考 B站动画区常见视觉风格，让观众第一眼就知道这是二次元向内容

image_style: "日系二次元动漫风格配图描述，anime绘画风格"

imagegen_style_prefix: "anime aesthetic, cel shading style, vibrant colors, soft lighting, cute expressions, studio ghibli inspired, pink and blue accent"

