name: vercel
display_name: Vercel (黑白极简)
description: Stark black/white duet, blue accent, minimal and geometric
colors:
  primary: '#000000'
  on_primary: '#ffffff'
  accent_blue: '#0070f3'
  ink: '#000000'
  body: '#333333'
  muted: '#666666'
  muted_soft: '#888888'
  canvas: '#ffffff'
  surface: '#fafafa'
  surface_code: '#0a0a0a'
  hairline: '#eaeaea'
  hairline_strong: '#dddddd'
  on_dark: '#ffffff'
  on_dark_muted: '#888888'
  code_bg: '#0a0a0a'
  code_text: '#e0e0e0'
  semantic_success: '#0070f3'
  semantic_warning: '#f5a623'
  semantic_error: '#ee0000'
typography:
  display_family: sans-serif
  body_family: sans-serif
  code_family: monospace
  display_xl:
    size: 80px
    weight: 700
    line_height: 1.0
    letter_spacing: -2.5px
  display_lg:
    size: 56px
    weight: 700
    line_height: 1.05
    letter_spacing: -1.8px
  display_md:
    size: 40px
    weight: 600
    line_height: 1.1
    letter_spacing: -1px
  display_sm:
    size: 28px
    weight: 600
    line_height: 1.2
    letter_spacing: -0.5px
  title_lg:
    size: 22px
    weight: 600
    line_height: 1.3
    letter_spacing: 0
  title_md:
    size: 18px
    weight: 600
    line_height: 1.4
    letter_spacing: 0
  title_sm:
    size: 16px
    weight: 600
    line_height: 1.4
    letter_spacing: 0
  body_md:
    size: 16px
    weight: 400
    line_height: 1.6
    letter_spacing: 0
  body_sm:
    size: 14px
    weight: 400
    line_height: 1.6
    letter_spacing: 0
  caption:
    size: 13px
    weight: 500
    line_height: 1.4
    letter_spacing: 0
  caption_uppercase:
    size: 11px
    weight: 600
    line_height: 1.4
    letter_spacing: 2px
  code:
    size: 14px
    weight: 400
    line_height: 1.6
    letter_spacing: 0
rounded:
  xs: 4px
  sm: 6px
  md: 8px
  lg: 12px
  xl: 16px
  pill: 9999px
spacing:
  xxs: 4px
  xs: 8px
  sm: 12px
  md: 16px
  lg: 24px
  xl: 32px
  xxl: 48px
  section: 96px
components:
  button_primary:
    bg: '{colors.primary}'
    text: '{colors.on_primary}'
    radius: '{rounded.md}'
    padding: 12px 24px
    height: 40px
  button_secondary:
    bg: '{colors.canvas}'
    text: '{colors.ink}'
    radius: '{rounded.md}'
    padding: 12px 24px
    border: 1px solid {colors.hairline}
  card_feature:
    bg: '{colors.surface}'
    text: '{colors.ink}'
    radius: '{rounded.lg}'
    padding: '{spacing.xl}'
  card_dark:
    bg: '{colors.surface_code}'
    text: '{colors.on_dark}'
    radius: '{rounded.lg}'
    padding: '{spacing.xl}'
  card_code:
    bg: '{colors.surface_code}'
    text: '{colors.on_dark}'
    radius: '{rounded.lg}'
    padding: '{spacing.lg}'
  badge:
    bg: '{colors.surface}'
    text: '{colors.muted}'
    radius: '{rounded.pill}'
    padding: 4px 12px
    font_size: '{typography.caption.size}'
  badge_accent:
    bg: '{colors.accent_blue}'
    text: '{colors.on_primary}'
    radius: '{rounded.pill}'
    padding: 4px 12px
    font_size: '{typography.caption_uppercase.size}'
    letter_spacing: '{typography.caption_uppercase.letter_spacing}'
  page_number:
    color: '{colors.muted_soft}'
    size: 13px
    weight: 500
layout_defaults:
visual_style_guide: |
  设计分镜和配图描述时，采用黑白极简几何风格。具体要求：
  1. 使用高对比度、简洁几何形状、黑白灰色系
  2. 技术概念用抽象几何和线条表达，极简但不失信息量
  3. 每页像一帧极简主义海报，视觉干净有力
  4. 色调与 vercel 风格色板协调（主色蓝 #0070f3、白底/黑底切换）
  5. 避免彩色过度、卡通、写实风格

image_style: "黑白极简几何风格，高对比度，干净抽象"

imagegen_style_prefix: "black and white minimalist geometric style, high contrast, clean abstract shapes, monochrome with blue accent"

layout_defaults:
  canvas_bg: '{colors.canvas}'
  content_bg: '{colors.canvas}'
  card_bg: '{colors.surface}'
  code_bg: '{colors.surface_code}'
  text_color: '{colors.ink}'
  heading_color: '{colors.ink}'
  body_color: '{colors.body}'
  muted_color: '{colors.muted}'
  accent_color: '{colors.accent_blue}'
  border_color: '{colors.hairline}'
  page_number_color: '{components.page_number.color}'
  page_number_size: '{components.page_number.size}'
  font_family: sans-serif
  code_family: monospace
  heading_family: sans-serif
  body_family: sans-serif
