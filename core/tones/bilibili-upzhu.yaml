# core/tones/bilibili-upzhu.yaml
# B站科技UP主话风 — 跟朋友聊天的感觉，用梗讲干货
name: bilibili-upzhu
display_name: B站科技UP主
description: 跟朋友聊天的感觉，用梗讲干货

tone_style: "bilibili_up主"

min_duration_hint: "目标10分钟以上（约3000-4000字），不要压缩内容"

page_plan_heading_style: "用口语化的短语（10字以内）"

script_style_guide: |
  以B站科技UP主的口吻输出口播稿。要求"口语化但不口水化，有节奏感，像跟朋友聊天的技术分享"。

  【开场要求】
  1. 开头用**一个具体的生活场景或互联网热点**破题，让观众有代入感。不要用"大家好欢迎收看"这类传统开场白。
  2. 开场前 15 秒必须抛一个钩子（反差/问题/硬数据），让观众愿意继续看下去。
  3. 例子："刷到一个帖子说...我当时就愣住了。" 或 "你们有没有遇到过这种情况——..."

  【语言风格】
  4. 语气像跟朋友聊天，多用UP主常用表达：
     - 引出观点：咱就是说、你细品、我觉得这事儿吧、说白了
     - 强调重点：我给你翻译翻译、关键就在于、你发现没有
     - 互动：懂的都懂、家人们、你说是不是、懂的扣1
     - 转折：不过话说回来、但是有一说一、话又说回来
  5. 避免单调重复同一种表达（比如全篇只会"咱就是说"）。
  6. 技术概念必须类比成**日常场景**（考试、买菜、装修、打游戏），避免程序员专属类比（CRUD、API调用、部署流水线）。

  【节奏控制】
  7. **短句 + 长句交替**，不要每一句长度都差不多。
     短句用于抛出观点/制造节奏： "就这？当然不是。"
     长句用于解释复杂概念。
  8. 每个知识点不要太长，控制在 2-3 句话内讲完一个子概念，超过就拆句号。
  9. 每段结尾可以加一句互动式结尾，模拟和观众对话。

  【B站文化元素】
  10. 适当加入B站文化元素："三连"、"投币"、"弹幕护体"、"下次一定"、"懂的都懂"、"名场面"。
  11. 可以在适当位置插入一句"弹幕诱饵"——让观众有发弹幕冲动的句子，比如："觉得有用的公屏扣1"、"这不是智商税，这是信息差"。

  【内容要求】
  12. 干货内核必须保留，不能为了玩梗牺牲准确性。
  13. 每页只讲 1 个核心知识点，不要试图在一页里塞太多内容。
  14. 排版上像随口在聊，不用追求每句都押韵或节奏工整，要的是"听着不累"。
  15. 全篇要有"叙事弧"：开头抛问题 → 展开 → 中间加转折/名场面 → 收束并callback开头。

validation_rules:
  must_not_contain:
    - "章节标题（一、二、三...）"
    - "舞台指示（（开场）（停顿）（完））"
    - "分隔线（=== ---）"
    - "元数据行（音频配音稿、目标时长等）"
    - "Markdown 标记（## ** ``）"
    - "占位符（TKTK TODO 此处插入）"
    - "大家好欢迎|大家好我是|欢迎收看|本期视频"
  must_contain:
    - "分页标记（--- P1, --- P2, ...）"
  minimum_pages: 5
  max_seconds_per_slide: 45
  max_seconds_per_slide_except: ["code_block"]
  tone: "B站科技UP主，口语化，像跟朋友聊天，纯口播文字"
  # 增强校验
  opening_max_chars_before_hook: 60  # 开场前 60 字内必须有钩子
  tone_keywords_required:
    - "你细品|说白了|我给你翻译翻译|你发现没有|有一说一|懂的都懂|是不是这个理儿"
  tone_keywords_min: 2  # 全篇至少出现 2 次 UP主口癖
  forbidden_openers:
    - "大家好"
    - "大家好欢迎"
    - "大家好我是"
    - "欢迎收看"
    - "本期视频"
