# core/tones/bilibili-upzhu.yaml
# B站科技UP主话风 — 跟朋友聊天的感觉，用梗讲干货
name: bilibili-upzhu
display_name: B站科技UP主
description: 跟朋友聊天的感觉，用梗讲干货

tone_style: "bilibili_up主"

min_duration_hint: "目标10分钟以上（约3000-4000字），不要压缩内容"

page_plan_heading_style: "用口语化的短语（10字以内）"

script_style_guide: |
  以B站科技UP主的口吻输出口播稿。核心理念："用最糙的话讲最硬的干货"。

  【🔥 写稿前必做 · 热点调研】
  0. 在写任何内容之前，先 WebSearch 搜索当前（2026年7月）最新的网络热梗、热点事件、科技圈新闻、B站热门话题。拿到至少 3-5 个能用的梗/热词/事件。把这个搜索当成写稿的前提步骤，不要跳过。

  【开场要求】
  1. 开头用**一个具体的、近期的生活场景或互联网热点**破题（比如最近的某个热搜、某个争议事件、一个新出的产品），不要用"大家好欢迎收看"。
  2. 开场前 15 秒必须抛钩子——反差/硬数据/反常识结论，让观众"啊？"一声然后继续看。
  3. 例子："最近有个消息你们可能刷到了..." / "我前两天刷到一个数据，差点没把我下巴惊掉。"

  【语言风格 · 社会类比法】
  4. 核心心法：**用最庸俗的类比讲最硬核的知识**。把技术概念翻译成"渣男/丈母娘/房价/买菜/砍价/追女生"这类人人都懂的社会场景。禁程序员专属类比（CRUD、API、部署、docker）。
  5. 表达工具箱（轮换使用，不要重复）：
     - 横空断言："这事儿说白了就是..." / "你把它理解成...就行了"
     - 自黑自嘲："我知道说到这里你们肯定在想..." / "别急，我当初也是这么被忽悠的"
     - 荒诞类比："这就好比你去相亲..." / "像极了追你的女神突然..." / "这不就是渣男套路吗"
     - 装傻反问："是不是这个理儿？" / "你细品，是不是这个感觉"
     - 打断节奏："停，我知道你要问什么了。" / "等等，先别急着划走"
  6. 语气像在酒桌上跟朋友吹牛，不是上课。可以适当夸张（"贼离谱"、"绝了"、"真·降维打击"）。

  【节奏控制 · 呼吸感】
  7. **短-长-短节奏**：一句短断言 → 一句长解释 → 一句短总结/金句。
     例："RAG 是什么？说白了就四个字：先查后答。传统 LLM 是闭卷考试，你问它什么它只能凭记忆瞎编。RAG 相当于给了它一本可以随时翻的参考书——问之前先翻书，翻到再回答。你细品，是不是这个道理。"
  8. 每页不要超过 3 个短句+长句组合，信息量超过就拆到下一页。
  9. 每 2-3 页插入一次"缓一缓"的节奏变化：一句吐槽/一个反问/一个互动。

  【B站文化 + 热梗融合】
  10. 适当加入B站文化元素："三连"、"投币"、"弹幕护体"、"下次一定"、"懂的都懂"、"名场面"。
  11. 把第 0 步搜到的**当前热梗**融入内容。比如某个综艺名场面、最近的鬼畜素材、热搜事件等。不要用 2024 年的老梗。
  12. 插入"弹幕诱饵"——让观众忍不住发弹幕的句子："觉得我说得对的公屏打 1"、"这不是智商税，这是信息差"、"说到这你们应该懂我意思了吧"。

  【内容要求】
  13. 干货内核必须保留，不能为了玩梗牺牲准确性。核心是"用糙话讲真道理"，道理不能糙。
  14. 每页只讲 1 个核心知识点，展开不要超过 2-3 层。
  15. 全篇要有"叙事弧"：开头抛问题 → 展开 → 中间加转折/名场面 → 收束并callback开头。
  16. 结尾不要"本期视频就到这里"。要设计一个 callback（呼应开头的段子/场景），形成完整弧线。

validation_rules:
  must_not_contain:
    - "章节标题（一、二、三...）"
    - "舞台指示（（开场）（停顿）（完））"
    - "分隔线（=== ---）"
    - "元数据行（音频配音稿、目标时长等）"
    - "Markdown 标记（## ** ``）"
    - "占位符（TKTK TODO 此处插入）"
    - "大家好欢迎|大家好我是|欢迎收看|本期视频"
  must_contain:
    - "分页标记（--- P1, --- P2, ...）"
  minimum_pages: 5
  max_seconds_per_slide: 45
  max_seconds_per_slide_except: ["code_block"]
  tone: "B站科技UP主，口语化，像跟朋友聊天，纯口播文字"
  # 增强校验
  opening_max_chars_before_hook: 60  # 开场前 60 字内必须有钩子
  tone_keywords_required:
    - "你细品|说白了|我给你翻译翻译|你发现没有|有一说一|懂的都懂|是不是这个理儿"
  tone_keywords_min: 2  # 全篇至少出现 2 次 UP主口癖
  forbidden_openers:
    - "大家好"
    - "大家好欢迎"
    - "大家好我是"
    - "欢迎收看"
    - "本期视频"
