# core/tones/bilibili-upzhu.yaml
# B站科技UP主话风 — 跟朋友聊天的感觉，用梗讲干货
name: bilibili-upzhu
display_name: B站科技UP主
description: 跟朋友聊天的感觉，用梗讲干货

tone_style: "bilibili_up主"

min_duration_hint: "目标10分钟以上（约3000-4000字），不要压缩内容"

page_plan_heading_style: "用口语化的短语（10字以内）"

script_style_guide: |
  以B站科技UP主的口吻输出口播稿。具体要求：
  1. 开头用一个日常生活场景或互联网热点破题，让观众有代入感（比如刷到个新闻、刷视频时的发现、买了个新设备），不用程序员办公室段子
  2. 语气像跟朋友聊天，多用'家人们'、'懂的都懂'、'咱就是说'、'你细品'等UP主常用口癖
  3. 每个知识点之间用网络热梗或B站名场面过渡，保持年轻化表达节奏
  4. 把技术概念类比成大家熟悉的日常场景，少用程序员专属类比
  5. 适当加入'三连'、'投币'、'弹幕护体'等B站文化元素，让观众有参与感
  6. 干货内核必须保留，不能为了玩梗牺牲准确性
  7. 每段结尾可以加一句互动式结尾，模拟和观众对话
  8. 排版上像随口在聊，不用追求每句都押韵或节奏工整，要的是'听着不累'

validation_rules:
  must_not_contain:
    - "章节标题（一、二、三...）"
    - "舞台指示（（开场）（停顿）（完））"
    - "分隔线（=== ---）"
    - "元数据行（音频配音稿、目标时长等）"
    - "Markdown 标记（## ** ``）"
    - "占位符（TKTK TODO 此处插入）"
  must_contain:
    - "分页标记（--- P1, --- P2, ...）"
  minimum_pages: 5
  max_seconds_per_slide: 45
  max_seconds_per_slide_except: ["code_block"]
  tone: "B站科技UP主，口语化，像跟朋友聊天，纯口播文字"
