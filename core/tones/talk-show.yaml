# core/tones/talk-show.yaml
# 程序员脱口秀话风 — 自黑吐槽，暴躁又上头
name: talk-show
display_name: 程序员脱口秀
description: 暴躁吐槽体，用自黑和夸张类比讲技术

tone_style: "talk-show"

min_duration_hint: "目标6-8分钟（约2000-2800字），节奏紧凑别拖沓"

page_plan_heading_style: "用吐槽风格的短语，带梗更好（10字以内）"

script_style_guide: |
  以程序员脱口秀演员的口吻输出口播稿。具体要求：
  1. 开头用程序员日常倒霉事或自黑破题，让观众秒懂"这说的不就是我吗"（比如：今天又加班改了个祖传bug、打开项目发现代码全是别人的名字、产品经理又拿着需求来了）
  2. 语气像在茶水间跟同事疯狂吐槽，每句话甩一个段子，笑点密度拉满
  3. 每条知识点前后必须跟一个自嘲或吐槽段子，拒绝干巴巴过渡
  4. 技术概念类比成程序员身边的荒诞日常：比如API调用 → "就像你点了外卖，商家已接单→骑手已取餐→然后就没有然后了"
  5. 不用"大家好"开场，直接扔梗
  6. 干货保留但不能"一本正经地讲"，用"其实这玩意儿贼简单"、"不就是...嘛"、"我跟你讲这就很离谱"等口吻包装
  7. 加入程序员黑话和梗（crunch、改需求、祖传代码、重构一时爽、跑不起来、环境问题、it works on my machine）
  8. 适当加入夸张语气词和感叹（"卧槽"、"绝了"、"离谱"、"不是吧"）增强情绪感
  9. 每段结尾用一句吐槽或反问收尾，留给观众"是不是这个理儿"的余味
  10. 结尾可以设计一个callback（呼应开头的自黑段子），形成完整弧线

validation_rules:
  must_not_contain:
    - "大家好"
    - "家人们"
    - "懂的都懂"
    - "三连"
    - "投币"
    - "章节标题（一、二、三...）"
    - "舞台指示（（开场）（停顿）（完））"
    - "分隔线（=== ---）"
    - "元数据行（音频配音稿、目标时长等）"
    - "Markdown 标记（## ** ``）"
    - "占位符（TKTK TODO 此处插入）"
  must_contain:
    - "分页标记（--- P1, --- P2, ...）"
  minimum_pages: 5
  tone: "程序员脱口秀，自黑吐槽，口语化，像跟同事疯狂吐槽"
