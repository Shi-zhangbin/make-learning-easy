<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>CSS 跑步小人</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #1a1a2e; display:flex; justify-content:center;
  align-items:center; min-height:100vh; font-family:sans-serif;
}

/* ── Container ── */
.runner {
  position:relative; width:60px; height:60px;
  margin:40px; display:inline-block;
  vertical-align:top;
}
.runner.big { width:120px; height:120px; }

/* ── SVG character ── */
.runner svg { width:100%; height:100%; display:block; }

/* ── Progress bar simulation ── */
.track {
  position:fixed; bottom:30px; left:10%; right:10%;
  height:4px; background:rgba(255,255,255,.15); border-radius:2px;
}
.track .fill {
  height:100%; width:0%; background:#FB7299; border-radius:2px;
  animation: fillTrack 4s linear infinite;
}
@keyframes fillTrack {
  0% { width:0%; }
  100% { width:100%; }
}
.track .dancer {
  position:absolute; bottom:-38px; width:60px; height:60px;
  animation: slideAlong 4s linear infinite; pointer-events:none;
}
@keyframes slideAlong {
  0% { left:0; transform:translateX(-30px); }
  100% { left:100%; transform:translateX(-30px); }
}

/* ── Running animation ── */
/* Body: slight bounce */
.runner .body { animation: bodyBob 0.6s ease-in-out infinite; }
@keyframes bodyBob {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-3px); }
}

/* Left upper leg: swings back and forth */
.runner .leg-l-u { transform-origin:24px 36px; animation: legLU 0.6s ease-in-out infinite; }
@keyframes legLU {
  0% { transform:rotate(25deg); }
  25% { transform:rotate(0deg); }
  50% { transform:rotate(-20deg); }
  75% { transform:rotate(0deg); }
  100% { transform:rotate(25deg); }
}

/* Left lower leg: bends at knee */
.runner .leg-l-l { transform-origin:20px 44px; animation: legLL 0.6s ease-in-out infinite; }
@keyframes legLL {
  0% { transform:rotate(-15deg); }
  25% { transform:rotate(0deg); }
  50% { transform:rotate(20deg); }
  75% { transform:rotate(0deg); }
  100% { transform:rotate(-15deg); }
}

/* Right upper leg: opposite phase */
.runner .leg-r-u { transform-origin:36px 36px; animation: legRU 0.6s ease-in-out infinite; }
@keyframes legRU {
  0% { transform:rotate(-20deg); }
  25% { transform:rotate(0deg); }
  50% { transform:rotate(25deg); }
  75% { transform:rotate(0deg); }
  100% { transform:rotate(-20deg); }
}

/* Right lower leg */
.runner .leg-r-l { transform-origin:32px 44px; animation: legRL 0.6s ease-in-out infinite; }
@keyframes legRL {
  0% { transform:rotate(20deg); }
  25% { transform:rotate(0deg); }
  50% { transform:rotate(-15deg); }
  75% { transform:rotate(0deg); }
  100% { transform:rotate(20deg); }
}

/* Arms */
.runner .arm-l { transform-origin:20px 28px; animation: armL 0.6s ease-in-out infinite; }
@keyframes armL {
  0% { transform:rotate(-25deg); }
  25% { transform:rotate(0deg); }
  50% { transform:rotate(20deg); }
  75% { transform:rotate(0deg); }
  100% { transform:rotate(-25deg); }
}
.runner .arm-r { transform-origin:40px 28px; animation: armR 0.6s ease-in-out infinite; }
@keyframes armR {
  0% { transform:rotate(20deg); }
  25% { transform:rotate(0deg); }
  50% { transform:rotate(-25deg); }
  75% { transform:rotate(0deg); }
  100% { transform:rotate(20deg); }
}

/* ── Scene setup ── */
h1 { color:#fff; position:fixed; top:40px; font-size:24px; font-weight:600; }
.demos { margin-top:80px; display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
.card { background:#333; border-radius:12px; padding:30px; text-align:center; }
.card p { color:rgba(255,255,255,.4); font-size:12px; margin-top:8px; }
.card .label { color:#FB7299; font-size:11px; font-weight:600; }
</style>
</head>
<body>

<h1>🏃 CSS 跑步小人</h1>

<div class="demos">

<!-- Size comparison: 60px vs 120px -->
<div class="card">
<div class="runner">
<svg viewBox="0 0 60 60" fill="none">
  <g class="body">
    <!-- Head -->
    <circle cx="30" cy="12" r="8" fill="white"/>
    <!-- Body -->
    <rect x="27" y="20" width="6" height="18" rx="3" fill="white"/>

    <!-- Left arm -->
    <g class="arm-l">
      <rect x="8" y="26" width="19" height="4" rx="2" fill="#FB7299"/>
    </g>
    <!-- Right arm -->
    <g class="arm-r">
      <rect x="33" y="26" width="19" height="4" rx="2" fill="#FB7299"/>
    </g>

    <!-- Left upper leg -->
    <g class="leg-l-u">
      <rect x="20" y="36" width="5" height="12" rx="2.5" fill="white"/>
      <!-- Left lower leg -->
      <g class="leg-l-l">
        <rect x="18" y="44" width="4" height="12" rx="2" fill="white"/>
      </g>
    </g>

    <!-- Right upper leg -->
    <g class="leg-r-u">
      <rect x="35" y="36" width="5" height="12" rx="2.5" fill="white"/>
      <!-- Right lower leg -->
      <g class="leg-r-l">
        <rect x="37" y="44" width="4" height="12" rx="2" fill="white"/>
      </g>
    </g>
  </g>
</svg>
</div>
<p class="label">60px</p>
<p>当前规格</p>
</div>

<div class="card">
<div class="runner big">
<svg viewBox="0 0 60 60" fill="none">
  <g class="body">
    <circle cx="30" cy="12" r="8" fill="white"/>
    <rect x="27" y="20" width="6" height="18" rx="3" fill="white"/>
    <g class="arm-l">
      <rect x="8" y="26" width="19" height="4" rx="2" fill="#FB7299"/>
    </g>
    <g class="arm-r">
      <rect x="33" y="26" width="19" height="4" rx="2" fill="#FB7299"/>
    </g>
    <g class="leg-l-u">
      <rect x="20" y="36" width="5" height="12" rx="2.5" fill="white"/>
      <g class="leg-l-l">
        <rect x="18" y="44" width="4" height="12" rx="2" fill="white"/>
      </g>
    </g>
    <g class="leg-r-u">
      <rect x="35" y="36" width="5" height="12" rx="2.5" fill="white"/>
      <g class="leg-r-l">
        <rect x="37" y="44" width="4" height="12" rx="2" fill="white"/>
      </g>
    </g>
  </g>
</svg>
</div>
<p class="label">120px</p>
<p>放大了看细节</p>
</div>

</div>

<!-- Progress bar simulation -->
<div class="track">
  <div class="fill"></div>
  <div class="dancer">
    <div class="runner">
      <svg viewBox="0 0 60 60" fill="none">
        <g class="body">
          <circle cx="30" cy="12" r="8" fill="white"/>
          <rect x="27" y="20" width="6" height="18" rx="3" fill="white"/>
          <g class="arm-l">
            <rect x="8" y="26" width="19" height="4" rx="2" fill="#FB7299"/>
          </g>
          <g class="arm-r">
            <rect x="33" y="26" width="19" height="4" rx="2" fill="#FB7299"/>
          </g>
          <g class="leg-l-u">
            <rect x="20" y="36" width="5" height="12" rx="2.5" fill="white"/>
            <g class="leg-l-l">
              <rect x="18" y="44" width="4" height="12" rx="2" fill="white"/>
            </g>
          </g>
          <g class="leg-r-u">
            <rect x="35" y="36" width="5" height="12" rx="2.5" fill="white"/>
            <g class="leg-r-l">
              <rect x="37" y="44" width="4" height="12" rx="2" fill="white"/>
            </g>
          </g>
        </g>
      </svg>
    </div>
  </div>
</div>

</body>
</html>
