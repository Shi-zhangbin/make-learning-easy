<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>像素跑步小人 demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;flex-direction:column;gap:40px;}
h1{color:#fff;font-size:24px;font-weight:600;}
h2{color:rgba(255,255,255,.4);font-size:14px;font-weight:400;}

/* ── The runner ── */
.runner-wrap {
  display:flex; gap:80px; align-items:center; flex-wrap:wrap; justify-content:center;
}

/* Progress bar simulation */
.track {
  width:600px; height:6px; background:rgba(255,255,255,.1); border-radius:3px;
  position:relative; margin-top:20px;
}
.track .fill {
  height:100%; width:50%; background:#FB7299; border-radius:3px;
}
.track .dancer {
  position:absolute; top:-70px; width:60px; height:60px;
  animation: moveRight 3s ease-in-out infinite alternate;
}
@keyframes moveRight {
  0% { left:0; }
  100% { left:540px; }
}

/* ── Single-frame CSS running animation ── */
.runner {
  width:60px; height:60px; position:relative;
}
.runner .char {
  width:60px; height:60px;
  animation: bob 0.5s ease-in-out infinite;
}
@keyframes bob {
  0%,100% { transform: translateY(0) scaleY(1); }
  50% { transform: translateY(-4px) scaleY(0.92); }
}

.runner .char .body {
  animation: lean 0.5s ease-in-out infinite;
}
@keyframes lean {
  0%,100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}

/* ── Detailed pixel runner ── */
.runner.detailed .char { animation: bob2 0.55s ease-in-out infinite; }
@keyframes bob2 {
  0%,100% { transform:translateY(0); }
  25% { transform:translateY(-3px) scaleY(0.95); }
  50% { transform:translateY(-1px); }
  75% { transform:translateY(-2px) scaleY(0.97); }
}

.runner.detailed .leg-l { transform-origin:24px 36px; animation: legLSwing 0.55s ease-in-out infinite; }
@keyframes legLSwing {
  0% { transform:rotate(-20deg); }
  25% { transform:rotate(-5deg); }
  50% { transform:rotate(15deg); }
  75% { transform:rotate(5deg); }
  100% { transform:rotate(-20deg); }
}
.runner.detailed .leg-r { transform-origin:36px 36px; animation: legRSwing 0.55s ease-in-out infinite; }
@keyframes legRSwing {
  0% { transform:rotate(15deg); }
  25% { transform:rotate(5deg); }
  50% { transform:rotate(-20deg); }
  75% { transform:rotate(-5deg); }
  100% { transform:rotate(15deg); }
}
.runner.detailed .arm-l { transform-origin:22px 26px; animation: armLSwing 0.55s ease-in-out infinite; }
@keyframes armLSwing {
  0% { transform:rotate(10deg); }
  50% { transform:rotate(-15deg); }
  100% { transform:rotate(10deg); }
}
.runner.detailed .arm-r { transform-origin:38px 26px; animation: armRSwing 0.55s ease-in-out infinite; }
@keyframes armRSwing {
  0% { transform:rotate(-15deg); }
  50% { transform:rotate(10deg); }
  100% { transform:rotate(-15deg); }
}

/* ── 60px canvas ── */
canvas { width:120px; height:120px; image-rendering:pixelated; background:#333; border-radius:8px; }

.card {
  background:#2a2a3e; border-radius:12px; padding:20px;
  text-align:center;
}
.card .label { font-size:11px; color:#FB7299; margin-top:8px; }
.card p { font-size:12px; color:rgba(255,255,255,.4); margin-top:4px; }
</style>
</head><body>
<h1>🏃 像素跑步小人</h1>
<h2>Canvas 逐帧渲染 + CSS 动画两种方案对比</h2>

<div class="runner-wrap">
  <div class="card">
    <canvas id="canvasRunner"></canvas>
    <div class="label">方案 A: Canvas 逐帧绘制</div>
    <p>每帧精确控制像素位置</p>
  </div>

  <div class="card">
    <div class="runner detailed">
      <svg width="60" height="60" viewBox="0 0 60 60">
        <circle cx="30" cy="10" r="7" fill="#ffd5a0"/>
        <g class="char">
          <rect x="26" y="17" width="8" height="16" rx="2" fill="#4FC3A1"/>
          <g class="arm-l"><rect x="10" y="22" width="16" height="4" rx="2" fill="#4FC3A1"/></g>
          <g class="arm-r"><rect x="34" y="22" width="16" height="4" rx="2" fill="#4FC3A1"/></g>
          <g class="leg-l">
            <rect x="21" y="32" width="6" height="14" rx="2" fill="#2E7D6F"/>
            <rect x="21" y="42" width="5" height="10" rx="2" fill="#2E7D6F"/>
          </g>
          <g class="leg-r">
            <rect x="33" y="32" width="6" height="14" rx="2" fill="#2E7D6F"/>
            <rect x="34" y="42" width="5" height="10" rx="2" fill="#2E7D6F"/>
          </g>
        </g>
      </svg>
    </div>
    <div class="label">方案 B: SVG+CSS 肢体动画</div>
    <p>CSS transform 驱动</p>
  </div>
</div>

<!-- Progress bar -->
<div class="track">
  <div class="fill"></div>
  <div class="dancer">
    <canvas id="miniRunner" width="60" height="60" style="width:60px;height:60px;image-rendering:pixelated;"></canvas>
  </div>
</div>

<script>
// ── Canvas pixel runner (方案 A) ──
// A simple pixel art runner drawn with canvas primitives
// Uses a 60x60 pixel grid for maximum precision

const COLORS = {
  skin: '#ffd5a0',
  shirt: '#4FC3A1',
  pants: '#2E7D6F',
  shoe: '#1a1a2e',
  eye: '#1a1a2e',
  hair: '#5D4037',
  outline: '#1a1a2e',
};

// 4-frame running cycle, each frame is a function that draws to a 60x60 canvas
function drawFrame(ctx, frame) {
  const w=60, h=60;
  ctx.clearRect(0,0,w,h);

  // Body position varies per frame for running motion
  const bob = [0, -2, -1, -2][frame]; // vertical bounce
  const tilt = [-2, 1, 2, -1][frame]; // body lean
  const legOffset = [4, 0, -4, 0][frame]; // leg swing

  // Head
  ctx.fillStyle = COLORS.skin;
  ctx.beginPath();
  ctx.arc(30, 10 + bob, 7, 0, Math.PI*2);
  ctx.fill();
  // Hair
  ctx.fillStyle = COLORS.hair;
  ctx.fillRect(23, 2 + bob, 14, 5);
  ctx.fillRect(22, 4 + bob, 3, 4);
  ctx.fillRect(35, 4 + bob, 3, 4);
  // Eyes
  ctx.fillStyle = COLORS.eye;
  ctx.fillRect(27, 9 + bob, 2, 2);
  ctx.fillRect(32, 9 + bob, 2, 2);

  // Body
  ctx.fillStyle = COLORS.shirt;
  ctx.save();
  ctx.translate(30, 20 + bob);
  ctx.rotate(tilt * Math.PI / 180);
  ctx.fillRect(-4, 0, 8, 15);
  // Arms (swing opposite to legs)
  const armSwing = -legOffset * 0.6;
  ctx.fillRect(-8, 2, 4, 10);
  ctx.fillRect(4, 2, 4, 10);
  ctx.restore();

  // Left leg
  ctx.fillStyle = COLORS.pants;
  ctx.save();
  ctx.translate(26, 34 + bob);
  ctx.rotate(legOffset * Math.PI / 180);
  ctx.fillRect(-2, 0, 4, 12);
  ctx.fillStyle = COLORS.shoe;
  ctx.fillRect(-3, 11, 6, 3);
  ctx.restore();

  // Right leg
  ctx.fillStyle = COLORS.pants;
  ctx.save();
  ctx.translate(34, 34 + bob);
  ctx.rotate((-legOffset) * Math.PI / 180);
  ctx.fillRect(-2, 0, 4, 12);
  ctx.fillStyle = COLORS.shoe;
  ctx.fillRect(-3, 11, 6, 3);
  ctx.restore();
}

// Animate canvas runner
const canvas = document.getElementById('canvasRunner');
const ctx = canvas.getContext('2d');
canvas.width = 60; canvas.height = 60;
let frame = 0;

setInterval(() => {
  drawFrame(ctx, frame);
  frame = (frame + 1) % 4;
}, 140);

// Mini runner on progress bar
const miniCanvas = document.getElementById('miniRunner');
const miniCtx = miniCanvas.getContext('2d');
miniCanvas.width = 60; miniCanvas.height = 60;
let miniFrame = 0;
setInterval(() => {
  drawFrame(miniCtx, miniFrame);
  miniFrame = (miniFrame + 1) % 4;
}, 140);

// Also draw initial frames
drawFrame(ctx, 0);
drawFrame(miniCtx, 0);
</script>
</body></html>
