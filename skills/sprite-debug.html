<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>精灵帧调试</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {font-family:sans-serif;background:#1a1a2e;color:#fff;padding:40px;}
h1 {font-size:28px;margin-bottom:6px;}
p {color:rgba(255,255,255,.5);margin-bottom:30px;}
section {margin-bottom:40px;}
h2 {font-size:20px;margin-bottom:12px;border-left:3px solid #FB7299;padding-left:12px;}

.grid {display:flex;gap:8px;flex-wrap:wrap;}
.frame-cell {width:80px;text-align:center;}
.frame-cell canvas {width:80px;height:80px;image-rendering:pixelated;background:#333;border-radius:4px;display:block;}
.frame-cell .label {font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;}

.demo {display:flex;gap:40px;flex-wrap:wrap;align-items:flex-start;}
.demo canvas {background:#333;border-radius:8px;image-rendering:pixelated;}
.ctrl {display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px;}
.ctrl button {padding:6px 16px;border:none;border-radius:4px;cursor:pointer;background:#FB7299;color:#fff;font-size:13px;}
.ctrl button:hover{background:#F25D88;}
.ctrl span {font-size:13px;color:rgba(255,255,255,.5);}
.slider-row {display:flex;align-items:center;gap:10px;margin-top:8px;}
.slider-row input {width:200px;}
table {border-collapse:collapse;font-size:12px;}
td,th {padding:4px 10px;border:1px solid rgba(255,255,255,.1);text-align:center;}
th {background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);}
td {font-family:monospace;}
</style>
</head><body>
<h1>🔍 精灵调试</h1>
<p>9 帧拆解 + 循环预览 — 诊断卡顿原因</p>

<section>
<h2>9 帧</h2>
<div class="grid" id="frameGrid"></div>
</section>

<section>
<h2>循环预览</h2>
<div class="demo">
<canvas id="anim" width="200" height="200"></canvas>
<div>
<div class="ctrl">
<button id="playBtn" onclick="togglePlay()">⏸ 暂停</button>
<button onclick="faster()">⏩ 加快</button>
<button onclick="slower()">⏪ 减慢</button>
<span id="spdLbl">周期 1.2s</span>
</div>
<div class="slider-row">
<input type="range" id="fSlider" min="0" max="8" value="0" step="1" oninput="goFrame(this.value)">
<span id="fLbl">帧 1/9</span>
</div>
</div>
<canvas id="chart" width="360" height="100"></canvas>
</div>
</section>

<section>
<h2>数据分析</h2>
<table id="tbl"><tr><th>帧</th><th>像素</th><th>水平</th><th>垂直</th><th>宽</th><th>高</th></tr></table>
</section>

<script>
(function() {
const src = new Image();
src.onload = function() {
    const FW=60, FH=60, N=9;
    const frames = [], data = [];

    // Extract each frame
    for (let i=0; i<N; i++) {
        const c = document.createElement('canvas');
        c.width = FW; c.height = FH;
        const ctx = c.getContext('2d');
        ctx.drawImage(src, i*FW, 0, FW, FH, 0, 0, FW, FH);
        frames.push(c);

        // Analyze
        const px = ctx.getImageData(0,0,FW,FH).data;
        let mass=0, cx=0, cy=0, mnX=99, mxX=0, mnY=99, mxY=0;
        for (let y=0; y<FH; y++) for (let x=0; x<FW; x++) {
            const a = px[(y*FW+x)*4+3];
            if (a>0) { mass+=a; cx+=x*a; cy+=y*a;
                if(x<mnX)mnX=x; if(x>mxX)mxX=x;
                if(y<mnY)mnY=y; if(y>mxY)mxY=y; }
        }
        if(mass>0){cx/=mass;cy/=mass;}
        data.push({mass,cx,cy,w:mxX-mnX+1,h:mxY-mnY+1});

        // Show in grid
        const g = document.getElementById('frameGrid');
        const d = document.createElement('div'); d.className='frame-cell';
        const cc = document.createElement('canvas'); cc.width=FW; cc.height=FH;
        cc.getContext('2d').drawImage(frames[i],0,0);
        const lb = document.createElement('div'); lb.className='label';
        lb.textContent = '#'+(i+1)+' '+(mass/1000).toFixed(0)+'k';
        d.appendChild(cc); d.appendChild(lb);
        g.appendChild(d);
    }

    // Table
    const tbl = document.getElementById('tbl');
    data.forEach((d,i)=>{
        const r=tbl.insertRow();
        r.innerHTML=`<td>${i+1}</td><td>${d.mass.toFixed(0)}</td><td>${d.cx.toFixed(1)}</td><td>${d.cy.toFixed(1)}</td><td>${d.w}</td><td>${d.h}</td>`;
    });

    // Motion chart
    const mnY = Math.min(...data.map(d=>d.cy)), mxY = Math.max(...data.map(d=>d.cy));
    const rng = Math.max(mxY-mnY,0.1), PAD=30, W=300, H=50;
    const cx = document.getElementById('chart').getContext('2d');
    cx.fillStyle='#333'; cx.fillRect(0,0,360,100);
    data.forEach((d,i)=>{
        const x=PAD+i*W/(N-1), y=25+(d.cy-mnY)/rng*H;
        if(i>0){const px=PAD+(i-1)*W/(N-1), py=25+(data[i-1].cy-mnY)/rng*H;
            cx.strokeStyle='rgba(255,255,255,.3)'; cx.lineWidth=1;
            cx.beginPath(); cx.moveTo(px,py); cx.lineTo(x,y); cx.stroke();}
        cx.beginPath(); cx.arc(x,y,3,0,Math.PI*2);
        cx.fillStyle=d.cy===mnY?'#4FC3A1':d.cy===mxY?'#ff5f56':'#FB7299'; cx.fill();
        cx.fillStyle='rgba(255,255,255,.4)'; cx.font='9px monospace'; cx.textAlign='center';
        cx.fillText(i+1,x,y-8);
    });
    const diff = (mxY-mnY).toFixed(1);
    cx.fillStyle='rgba(255,255,255,.5)'; cx.font='11px sans-serif'; cx.textAlign='left';
    cx.fillText(`垂直偏移: ${diff}px  ${diff<1?'✅流畅':diff<2?'⚠️轻微':'❌卡顿'}`, 10, 85);

    // Animation
    const ac = document.getElementById('anim').getContext('2d');
    let cur=0, playing=true, cycle=1.2, accum=0, last=0;

    function draw(f) {
        ac.fillStyle='#333'; ac.fillRect(0,0,200,200);
        ac.save(); ac.translate(100,100);
        const s = 200/FW*0.85; ac.scale(s,s);
        ac.drawImage(frames[Math.floor(f)%9], -FW/2, -FH/2);
        ac.restore();
        document.getElementById('fLbl').textContent = '帧 '+(Math.floor(f)%9+1)+'/9';
        document.getElementById('fSlider').value = Math.floor(f)%9;
    }

    function anim(t) {
        const dt=last?(t-last)/1000:0; last=t;
        if(playing&&dt<0.1) {accum+=dt;
            const fd=cycle/9;
            if(accum>=fd){cur=(cur+1)%9; accum-=fd;}
        }
        draw(cur);
        requestAnimationFrame(anim);
    }
    requestAnimationFrame(anim);

    window.togglePlay=function(){playing=!playing;
        document.getElementById('playBtn').textContent=playing?'⏸ 暂停':'▶ 播放';};
    window.faster=function(){cycle=Math.max(0.2,cycle-0.2);
        document.getElementById('spdLbl').textContent='周期 '+cycle.toFixed(1)+'s';};
    window.slower=function(){cycle=Math.min(3,cycle+0.2);
        document.getElementById('spdLbl').textContent='周期 '+cycle.toFixed(1)+'s';};
    window.goFrame=function(v){cur=parseInt(v);draw(cur);playing=false;
        document.getElementById('playBtn').textContent='▶ 播放';};
};
