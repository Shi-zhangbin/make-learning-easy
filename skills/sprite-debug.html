<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>精灵调试 — 预设对比</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#1a1a2e;color:#fff;padding:40px;}
h1{font-size:28px;margin-bottom:6px;}
p{color:rgba(255,255,255,.5);margin-bottom:30px;}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.tabs button{padding:8px 20px;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:transparent;color:#fff;font-size:14px;cursor:pointer;font-family:inherit;}
.tabs button.active{background:#FB7299;border-color:#FB7299;}
.panel{display:none;}
.panel.active{display:block;}
.grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;}
.grid .f{width:70px;text-align:center;}
.grid .f canvas{width:70px;height:70px;image-rendering:pixelated;background:#333;border-radius:4px;}
.preview{display:flex;gap:30px;align-items:flex-start;flex-wrap:wrap;}
.preview canvas{background:#333;border-radius:8px;image-rendering:pixelated;}
.ctrl{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center;}
.ctrl button{padding:6px 16px;border:none;border-radius:4px;cursor:pointer;background:#FB7299;color:#fff;font-size:13px;}
.ctrl span{color:rgba(255,255,255,.5);font-size:13px;}
table{border-collapse:collapse;font-size:12px;margin-top:12px;}
td,th{padding:3px 10px;border:1px solid rgba(255,255,255,.1);text-align:center;}
th{background:rgba(255,255,255,.05);}
</style>
</head><body>
<h1>🔍 精灵预设对比</h1>
<p>boy / dino / cat — 点击切换</p>
<div class="tabs" id="tabs"></div>
<div id="panels"></div>
<script>
const STYLES=['boy','dino','cat'];
const NAMES={boy:'🏃 boy 跑步',dino:'🦖 dino 恐龙跑',cat:'🐱 cat 打字'};

async function init(){
  for(const s of STYLES){
    let btn=document.createElement('button');
    btn.textContent=NAMES[s];
    btn.onclick=()=>switchTab(s);
    document.getElementById('tabs').appendChild(btn);
    let panel=document.createElement('div');
    panel.className='panel';panel.id='p-'+s;
    panel.innerHTML=`<div class="grid" id="g-${s}"></div><div class="preview"><canvas id="a-${s}" width="200" height="200"></canvas><div class="ctrl"><button onclick="toggle('${s}')" id="b-${s}">⏸</button></div></div><div id="t-${s}"></div>`;
    document.getElementById('panels').appendChild(panel);
  }
  for(const s of STYLES){let img=new Image();img.onload=()=>setup(s,img);img.src='sprites/'+s+'.png';}
  switchTab('boy');
}
function switchTab(n){document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));let bs=[...document.querySelectorAll('.tabs button')];let idx=STYLES.indexOf(n);if(bs[idx])bs[idx].classList.add('active');let p=document.getElementById('p-'+n);if(p)p.classList.add('active');}
function toggle(s){let b=document.getElementById('b-'+s);let p=b.textContent=='⏸';b.textContent=p?'▶':'⏸';window['_p'+s]=!p;}
function setup(s,img){
  let FW=60,FH=60,N=9,frames=[];
  for(let i=0;i<N;i++){let c=document.createElement('canvas');c.width=FW;c.height=FH;c.getContext('2d').drawImage(img,i*FW,0,FW,FH,0,0,FW,FH);frames.push(c);let d=document.createElement('div');d.className='f';let cc=document.createElement('canvas');cc.width=FW;cc.height=FH;cc.getContext('2d').drawImage(frames[i],0,0);d.appendChild(cc);document.getElementById('g-'+s).appendChild(d);}
  let ac=document.getElementById('a-'+s).getContext('2d');let cur=0,cycle=1.2,fd=cycle/9,acc=0,last=0;window['_p'+s]=true;
  function dr(f){ac.fillStyle='#333';ac.fillRect(0,0,200,200);ac.save();ac.translate(100,100);let sc=200/FW*0.85;ac.scale(sc,sc);ac.drawImage(frames[Math.floor(f)%9],-FW/2,-FH/2);ac.restore();}
  function anim(t){let dt=last?(t-last)/1000:0;last=t;if(window['_p'+s]&&dt<0.1){acc+=dt;if(acc>=fd){cur=(cur+1)%9;acc-=fd;}}dr(cur);requestAnimationFrame(anim);}
  requestAnimationFrame(anim);
}
init();
</script>
</body></html>
