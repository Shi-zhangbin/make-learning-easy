<!doctype html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1920,height=1080">
<title>第1期 Mintlify风格</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
html,body{width:1920px;height:1080px;overflow:hidden;background:#ffffff;}
.sl{width:100%;height:100%;display:flex;flex-direction:column;padding:60px 80px;position:relative;}
.sl::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(to bottom,#0d9373,#0a755d);}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:4px;background:#e6f7f0;color:#0d9373;font-size:12px;font-weight:600;margin-bottom:70px;}
h1{font-size:64px;font-weight:700;color:#0a0a0a;line-height:1.1;margin-bottom:14px;}
.sub{font-size:19px;color:#5a5a5a;line-height:1.5;margin-bottom:36px;}
.tags{display:flex;gap:10px;margin-bottom:50px;flex-wrap:wrap;}
.tag{padding:4px 12px;border-radius:4px;font-size:13px;background:#f5f5f5;color:#333;}
.tag.cmd{background:#0d0d0d;color:#e0e0e0;font-family:'SF Mono',monospace;font-size:12px;}
.info{display:flex;gap:40px;padding-top:24px;border-top:1px solid #e5e5e5;}
.info-item{font-size:13px;color:#888;}.info-item strong{display:block;color:#0a0a0a;font-size:16px;margin-top:2px;font-weight:600;}
</style></head><body>
<div class="sl">
  <div class="badge">📖 第1期 · 昇腾模型部署及调优</div>
  <h1>连上服务器 +<br>环境长什么样</h1>
  <div class="sub">你完全不懂怎么连服务器？没关系，这一期从零开始。<br>从SSH到Python环境，每一步都给你看。</div>
  <div class="tags">
    <span class="tag cmd">ssh user@host</span>
    <span class="tag">ls / cd / python3</span>
    <span class="tag cmd">nvidia-smi</span>
    <span class="tag cmd">npu-smi info</span>
    <span class="tag">pip install torch</span>
  </div>
  <div class="info">
    <div class="info-item">本期目标<strong>✅ 连上服务器 · 看硬件 · 跑Python</strong></div>
    <div class="info-item">适合<strong>纯小白 · 零基础起步</strong></div>
  </div>
</div></body></html>
