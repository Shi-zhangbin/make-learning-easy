<!doctype html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1920,height=1080">
<title>开始之前，确认你有这些</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
html,body{width:1920px;height:1080px;overflow:hidden;background:#000;}
.slide{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;}

.sl{width:100%;height:100%;display:flex;flex-direction:column;padding:50px 80px;position:relative;background:#ffffff;}
.sl::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(to bottom,#00d4a4,#00b48a);}
.badge{font-size:11px;color:#00d4a4;letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:8px;}
h1{font-size:64px;font-weight:700;color:#0a0a0a;line-height:1.1;margin-bottom:12px;}
h2{font-size:46px;font-weight:700;color:#0a0a0a;line-height:1.1;margin-bottom:18px;}
h2 .hl{color:#00d4a4;}
.pr{position:absolute;bottom:18px;right:28px;font-size:13px;color:#888888;}
.cmd-box{background:#1c1c1e;border-radius:6px;padding:14px 18px;font-family:monospace;font-size:15px;line-height:1.6;color:#e0e0e0;margin:10px 0;}
.cmd-out{color:#888;}.cmd-in{color:#00d4a4;}
.card{background:#fafafa;border:1px solid #e5e5e5;border-radius:8px;padding:16px 18px;margin-bottom:10px;}
.card-title{font-size:16px;font-weight:600;color:#0a0a0a;margin-bottom:3px;}
.card-body{font-size:14px;color:#5a5a5c;line-height:1.5;}
.tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:12px;background:#f7f7f7;color:#888888;border:1px solid #e5e5e5;margin:2px;font-weight:500;}
.tag-g{background:#e8faf4;color:#0d9373;border-color:#b8ead9;font-family:monospace;}
.tip{background:#fef9e7;border:1px solid #f5e6c0;border-radius:6px;padding:10px 14px;margin:6px 0;font-size:13px;color:#b8860b;line-height:1.4;}
.out-box{background:#1c1c1e;border-radius:6px;padding:10px 14px;font-family:monospace;font-size:13px;line-height:1.5;color:#888;margin:8px 0;}
</style>
</head><body>
<section class="slide" id="slide-3" data-composition-id="s3" data-width="1920" data-height="1080">
    <div class="sl">
      <div class="badge">准备工作</div>
      <h2>开始之前，确认你有这些</h2>
      <div style="display:flex;gap:20px;flex:1;align-items:center;">
        <div class="card" style="flex:1;text-align:center;padding:28px;"><div style="font-size:36px;margin-bottom:8px;">💻</div><div class="card-title">你的MacBook</div><div class="card-body">终端(Terminal)已经装好了<br>按 Cmd+空格 搜 Terminal</div></div>
        <div style="font-size:28px;color:#d0d0d0;">→</div>
        <div class="card" style="flex:1;text-align:center;padding:28px;"><div style="font-size:36px;margin-bottom:8px;">🌐</div><div class="card-title">服务器IP+账号</div><div class="card-body">公司给你的服务器地址<br>用户名和密码/密钥文件</div></div>
        <div style="font-size:28px;color:#d0d0d0;">→</div>
        <div class="card" style="flex:1;text-align:center;padding:28px;background:#e8faf4;border-color:#b8ead9;"><div style="font-size:36px;margin-bottom:8px;">🚀</div><div class="card-title" style="color:#0d9373;">准备就绪</div><div class="card-body">看完这期你就能<br>自己连上去操作了</div></div>
      </div>
    </div></section>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  tl.from(".sl>*",{opacity:0,y:8,duration:0.25,stagger:0.04});
  window.__timelines = window.__timelines || {};
  window.__timelines["s3"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s3"] = {"duration":7.50,"seek":function(t){var tl=window.__timelines&&window.__timelines["s3"];if(tl)tl.seek(t);}};
  if(top===self)tl.progress(1);
})();
</script>
</body></html>
