<!doctype html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1920,height=1080">
<title>第1期 Linear风格</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
html,body{width:1920px;height:1080px;overflow:hidden;background:#010102;}
.sl{width:100%;height:100%;display:flex;flex-direction:column;padding:60px 80px;position:relative;
  background:radial-gradient(ellipse at 70% 30%,rgba(94,106,210,0.08) 0%,transparent 50%);}
.badge{font-size:13px;color:#5e6ad2;letter-spacing:2px;margin-bottom:80px;font-weight:500;}
h1{font-size:72px;font-weight:600;color:#f7f8f8;line-height:1.05;letter-spacing:-2px;margin-bottom:16px;}
.sub{font-size:22px;color:#8a8f98;font-weight:400;margin-bottom:40px;line-height:1.4;}
.tags{display:flex;gap:12px;margin-bottom:60px;}
.tag{padding:6px 16px;border-radius:6px;font-size:13px;background:#0f1011;border:1px solid #23252a;color:#d0d6e0;}
.info{display:flex;gap:40px;padding-top:30px;border-top:1px solid #23252a;}
.info-item{font-size:14px;color:#62666d;}.info-item span{display:block;color:#d0d6e0;font-size:15px;margin-top:4px;font-weight:500;}
</style></head><body>
<div class="sl">
  <div class="badge">昇腾模型部署及调优 · 第1期 / 共10期</div>
  <h1>连上服务器 +<br>环境长什么样</h1>
  <div class="sub">SSH怎么连 · 看硬件状态 · Python环境确认<br>从零开始，没有任何跳过</div>
  <div class="tags">
    <span class="tag">🔌 SSH</span>
    <span class="tag">🐧 Linux基础</span>
    <span class="tag">🖥️ nvidia-smi</span>
    <span class="tag">🔵 npu-smi</span>
    <span class="tag">🐍 Python环境</span>
  </div>
  <div class="info">
    <div class="info-item">产出物<span>服务器连接成功 + 硬件状态截图</span></div>
    <div class="info-item">时长<span>~18分钟</span></div>
    <div class="info-item">难度<span>⭐ 纯小白起步</span></div>
  </div>
</div></body></html>
