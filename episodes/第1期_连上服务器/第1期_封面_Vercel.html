<!doctype html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1920,height=1080">
<title>第1期 Vercel风格</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
html,body{width:1920px;height:1080px;overflow:hidden;background:#ffffff;}
.sl{width:100%;height:100%;display:flex;flex-direction:column;padding:70px 90px;position:relative;
  background-image:radial-gradient(#ebebeb 1px,transparent 1px);background-size:30px 30px;}
.badge{font-size:12px;color:#888;letter-spacing:2px;margin-bottom:70px;font-weight:500;}
h1{font-size:68px;font-weight:600;color:#171717;line-height:1.1;letter-spacing:-1.5px;margin-bottom:14px;}
.sub{font-size:20px;color:#4d4d4d;margin-bottom:36px;line-height:1.5;}
.tags{display:flex;gap:10px;margin-bottom:50px;flex-wrap:wrap;}
.tag{padding:5px 14px;border-radius:4px;font-size:13px;background:#f5f5f5;color:#444;border:1px solid #ebebeb;}
.tag.code{background:#d3e5ff;color:#0761d1;border-color:#a1c4f5;font-family:'SF Mono',monospace;font-size:12px;}
.info{display:flex;gap:50px;padding-top:28px;border-top:1px solid #ebebeb;}
.info-item{font-size:13px;color:#888;}.info-item span{display:block;color:#171717;font-size:16px;margin-top:3px;font-weight:500;}
</style></head><body>
<div class="sl">
  <div class="badge">第1期 / 10 · 昇腾模型部署及调优</div>
  <h1>连上服务器 +<br>环境长什么样</h1>
  <div class="sub">从SSH连上你的第一台服务器开始<br>看硬件、找环境、跑你的第一个Python</div>
  <div class="tags">
    <span class="tag code">ssh user@ip</span>
    <span class="tag">ls / cd / pwd</span>
    <span class="tag code">nvidia-smi</span>
    <span class="tag code">npu-smi info</span>
    <span class="tag">python3 --version</span>
  </div>
  <div class="info">
    <div class="info-item">本期产出<span>✅ 能连上服务器 · 能看到显卡 · 能跑Python</span></div>
    <div class="info-item">难度<span>⭐ 从纯小白开始</span></div>
  </div>
</div></body></html>
