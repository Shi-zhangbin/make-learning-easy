<!doctype html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1920,height=1080">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
html,body{width:1920px;height:1080px;overflow:hidden;background:#000;}
section{width:1920px;height:1080px;overflow:hidden;position:relative;}

.cw{width:100%;height:100%;display:flex;flex-direction:column;padding:40px 60px;position:relative;background:#f8f6ff;}
.ch{font-size:11px;color:#00d4a4;letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:6px;}
.ct{font-size:36px;font-weight:700;color:#0a0a0a;margin-bottom:14px;}
.cb{flex:1;background:#13131a;border-radius:10px;padding:20px 24px;overflow:hidden;}
.cb code{font-family:monospace;font-size:13px;line-height:1.5;color:#e0e0e0;white-space:pre;}
.pr{position:absolute;bottom:18px;right:28px;font-size:13px;color:#888;}

</style></head><body>
<section data-composition-id="s4" data-width="1920" data-height="1080">
<div class="cw"><div class="ch">STEP 03</div><div class="ct">一句话出片</div><div class="cb"><code>bash go.sh start "PyTorch推理入门" 2</code></div><div class="pr">4/5</div></div>
</section>
<script>(function(){
var tl=gsap.timeline({paused:true});
tl.from(".ch,.ct,.cb",{opacity:0,y:10,duration:.3,stagger:.04});
window.__timelines=window.__timelines||{};window.__timelines["s4"]=tl;
window.__hf=window.__hf||{};window.__hf["s4"]={duration:10.0,seek:function(t){var tl=window.__timelines&&window.__timelines["s4"];if(tl)tl.seek(t);}};
if(top===self)tl.progress(1);
})();
</script></body></html>
