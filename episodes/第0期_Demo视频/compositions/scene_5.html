<!doctype html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1920,height=1080">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
html,body{width:1920px;height:1080px;overflow:hidden;background:#000;}
section{width:1920px;height:1080px;overflow:hidden;position:relative;}

.sl{width:100%;height:100%;display:flex;flex-direction:column;padding:50px 80px;position:relative;background:#ffffff;}
.sl::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(to bottom,#00d4a4,#00d4a4cc);}
.badge{font-size:11px;color:#00d4a4;letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:8px;}
h2{font-size:46px;font-weight:700;color:#0a0a0a;line-height:1.15;margin-bottom:16px;}
.pr{position:absolute;bottom:18px;right:28px;font-size:13px;color:#888;}
.card{background:#fafafa;border:1px solid #e5e5e5;border-radius:8px;padding:16px 18px;margin-bottom:10px;}
.card-t{font-size:16px;font-weight:600;color:#0a0a0a;margin-bottom:3px;}
.card-b{font-size:14px;color:#5a5a5c;line-height:1.5;}

.tl{display:flex;flex:1;flex-direction:column;justify-content:center;position:relative;padding:20px 0 20px 30px;}
.tl::before{content:'';position:absolute;left:10px;top:40px;bottom:40px;width:2px;background:#00d4a4;}
.tli{position:relative;padding:8px 0 8px 30px;}
.tli::before{content:'';position:absolute;left:-3px;top:14px;width:8px;height:8px;border-radius:50%;background:#00d4a4;}
.tli-t{font-size:13px;color:#00d4a4;font-weight:600;}
.tli-b{font-size:15px;color:#333;}

</style></head><body>
<section data-composition-id="s5" data-width="1920" data-height="1080">
<div class="sl"><div class="badge">FINAL</div><h2>下期预告</h2><div class="tl"><div class="tli"><div class="tli-t">Step 1</div><div class="tli-b">开始</div></div><div class="tli"><div class="tli-t">Step 2</div><div class="tli-b">执行</div></div><div class="tli"><div class="tli-t">Step 3</div><div class="tli-b">完成</div></div></div><div class="pr">5/5</div></div>
</section>
<script>(function(){
var tl=gsap.timeline({paused:true});
tl.from(".badge,h2,.tli",{opacity:0,x:-8,duration:.3,stagger:.04});
window.__timelines=window.__timelines||{};window.__timelines["s5"]=tl;
window.__hf=window.__hf||{};window.__hf["s5"]={duration:8.0,seek:function(t){var tl=window.__timelines&&window.__timelines["s5"];if(tl)tl.seek(t);}};
if(top===self)tl.progress(1);
})();
</script></body></html>
