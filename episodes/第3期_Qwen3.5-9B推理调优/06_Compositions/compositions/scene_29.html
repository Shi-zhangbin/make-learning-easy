  <div class="s29-badge">📞 第四步：对话</div>
  <div class="s29-h2">curl——与模型对话</div>
  <div class="s29-body">
    <div class="s29-left">
      <div class="s29-visual">
        <div class="v-icon">📞</div>

      <div class="s29-card">
        <h4>curl是什么</h4>
        <p>你在终端写一条curl命令，它就帮你在网络上把话传到模型那里，再把模型的回答带回来</p>
      </div>
      <div class="s29-card">
        <h4>访问地址</h4>
        <p><code>http://localhost:8010/v1/chat/completions</code></p>
      </div>
      <div class="s29-card">
        <h4>开新窗口</h4>
        <p>在另一个终端窗口执行（vLLM服务窗口保持运行）</p>
      </div>
    </div>
  </div>
  <div class="s29-page">29/37</div>
