<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s9"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: linear-gradient(135deg, #0d1117 0%, #1a1a2e 50%, #0d1117 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.s9-icon { font-size: 52px; margin-bottom: 20px; }
.s9-title { font-size: 80px; font-weight: 800; color: #ffffff; text-align: center; }
.s9-title span { color: #00BFA5; }
.s9-accent { width: 100px; height: 3px; background: #00BFA5; margin: 20px auto; border-radius: 2px; }
.s9-subtitle { font-size: 26px; color: rgba(255,255,255,0.6); margin-top: 4px; letter-spacing: 2px; }
.s9-dims { display: flex; gap: 40px; margin-top: 36px; }
.s9-dim { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.s9-dim .d-icon { font-size: 30px; }
.s9-dim .d-label { font-size: 18px; color: rgba(255,255,255,0.5); }
.s9-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div data-composition-id="s9" data-width="1920" data-height="1080">
  <div class="s9-icon">🏎️</div>
  <div class="s9-title">改车总得有个<span>衡量标准</span></div>
  <div class="s9-accent"></div>
  <div class="s9-subtitle">加速更快？极速更高？还是更省油？</div>
  <div class="s9-dims">
    <div class="s9-dim"><span class="d-icon">⚡</span><span class="d-label">首token延迟</span></div>
    <div class="s9-dim"><span class="d-icon">🚀</span><span class="d-label">吞吐量</span></div>
    <div class="s9-dim"><span class="d-icon">⛽</span><span class="d-label">显存</span></div>
  </div>
  <div class="s9-page">09/37</div>
</div>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  var sc = '[data-composition-id="s9"]';
  tl.from(sc+' .s9-icon', {opacity:0, y:-30, duration:0.5, ease:'power2.out'});
  tl.from(sc+' .s9-title', {opacity:0, y:15, duration:0.6, ease:'power2.out'}, '-=0.3');
  tl.from(sc+' .s9-accent', {scaleX:0, duration:0.4, ease:'power2.out'}, '-=0.3');
  tl.from(sc+' .s9-subtitle', {opacity:0, y:12, duration:0.5, ease:'power2.out'}, '-=0.2');
  tl.from(sc+' .s9-dim', {opacity:0, y:15, stagger:0.12, duration:0.4, ease:'power2.out'}, '-=0.2');
  window.__timelines = window.__timelines || {};
  window.__timelines["s9"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s9"] = {duration:25.0, seek:function(t){var tl=window.__timelines&&window.__timelines["s9"];if(tl)tl.seek(t);}};
})();
</script>
</body>
</html>
