<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s28"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 140px; text-align: center;
}
.s28-badge {
  display: inline-block; background: #00BFA5; color: #fff; font-size: 17px;
  padding: 6px 20px; border-radius: 20px; margin-bottom: 28px;
}
.s28-h2 { font-size: 54px; font-weight: 700; color: #ffffff; margin-bottom: 32px; }
.s28-quote {
  background: rgba(255,255,255,0.06); border-radius: 16px;
  padding: 30px 40px; border-left: 4px solid #00BFA5;
  text-align: left; max-width: 85%;
}
.s28-quote p { font-size: 20px; color: #c9d1d9; line-height: 1.6; font-style: italic; }
.s28-quote .hl { color: #00BFA5; font-weight: 700; font-style: normal; }
.s28-progress {
  margin-top: 30px; display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
}
.s28-progress-item {
  background: rgba(255,255,255,0.05); border-radius: 10px;
  padding: 10px 18px; font-size: 17px; color: #8b949e; display: flex; align-items: center; gap: 8px;
}
.s28-progress-item.done { color: #00BFA5; }
.s28-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #484f58; }
</style>
</head>
<body>
<div data-composition-id="s28" data-width="1920" data-height="1080">
  <div class="s28-badge">✅ 启动成功</div>
  <div class="s28-h2">引擎哼起来了</div>
  <div class="s28-quote">
    <p>看到屏幕上出现 <span class="hl">Uvicorn running on http://0.0.0.0:8010</span> 这一行字的时候，恭喜你——引擎点火成功了，模型已经开始运行在vLLM之上了。</p>
  </div>
  <div class="s28-progress">
    <div class="s28-progress-item done">✅ 模型权重加载</div>
    <div class="s28-progress-item done">✅ 显存分配</div>
    <div class="s28-progress-item done">✅ PagedAttention初始化</div>
    <div class="s28-progress-item">⏱ 大概等几十秒到一两分钟</div>
  </div>
  <div class="s28-page">28/37</div>
</div>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  var sc = '[data-composition-id="s28"]';
  tl.from(sc+' .s28-badge', {opacity:0, y:-20, duration:0.3});
  tl.from(sc+' .s28-h2', {opacity:0, y:-15, duration:0.4, ease:'power2.out'}, '-=0.2');
  tl.from(sc+' .s28-quote', {opacity:0, x:-30, duration:0.5, ease:'power2.out'}, '-=0.2');
  tl.from(sc+' .s28-progress-item', {opacity:0, y:15, stagger:0.1, duration:0.3, ease:'power2.out'}, '-=0.2');
  window.__timelines = window.__timelines || {};
  window.__timelines["s28"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s28"] = {duration:25.0, seek:function(t){var tl=window.__timelines&&window.__timelines["s28"];if(tl)tl.seek(t);}};
})();
</script>
</body>
</html>
