<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s36"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: #ffffff; display: flex; flex-direction: column; padding: 60px 80px;
}
.s36-badge {
  display: inline-block; background: #00BFA5; color: #fff; font-size: 17px;
  padding: 4px 14px; border-radius: 20px; align-self: flex-start; margin-bottom: 14px;
}
.s36-h2 { font-size: 54px; font-weight: 700; color: #1a1a2e; margin-bottom: 36px; }
.s36-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; flex: 1; align-content: center; }
.s36-card {
  background: #f8f9fa; border-radius: 16px; padding: 28px 24px;
  display: flex; flex-direction: column; gap: 14px;
  border-top: 4px solid #00BFA5;
  transition: transform 0.2s;
}
.s36-card .icon { font-size: 42px; }
.s36-card h4 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
.s36-card p { font-size: 18px; color: #444; line-height: 1.5; }
.s36-card:nth-child(2) { border-top-color: #1a73e8; }
.s36-card:nth-child(3) { border-top-color: #ff6b35; }
.s36-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #99a; }
</style>
</head>
<body>
<div data-composition-id="s36" data-width="1920" data-height="1080">
  <div class="s36-badge">💡 核心认知</div>
  <div class="s36-h2">你今天学到的三件事</div>
  <div class="s36-grid">
    <div class="s36-card">
      <div class="icon">🏎️</div>
      <h4>调优不神秘</h4>
      <p>推理调优 = 汽车改装。在资源约束下找到最适合你使用场景的配置。不是魔法，是工程。</p>
    </div>
    <div class="s36-card">
      <div class="icon">⚖️</div>
      <h4>不是越大越好</h4>
      <p>max-model-len和max-num-seqs不是越大越厉害，需要根据实际场景权衡。短对话场景里收紧反而更快。</p>
    </div>
    <div class="s36-card">
      <div class="icon">🔬</div>
      <h4>可重复的科学实验</h4>
      <p>改参数 → 测速度 → 看结果 → 再改再测。这套方法不仅适用于模型推理，是优化任何计算机系统的通用方法论。</p>
    </div>
  </div>
  <div class="s36-page">36/37</div>
</div>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  var sc = '[data-composition-id="s36"]';
  tl.from(sc+' .s36-badge', {opacity:0, y:-10, duration:0.3});
  tl.from(sc+' .s36-h2', {opacity:0, y:-15, duration:0.4}, '-=0.2');
  tl.from(sc+' .s36-card', {opacity:0, y:30, stagger:0.12, duration:0.45, ease:'power2.out'}, '-=0.2');
  window.__timelines = window.__timelines || {};
  window.__timelines["s36"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s36"] = {duration:25.0, seek:function(t){var tl=window.__timelines&&window.__timelines["s36"];if(tl)tl.seek(t);}};
})();
</script>
</body>
</html>
