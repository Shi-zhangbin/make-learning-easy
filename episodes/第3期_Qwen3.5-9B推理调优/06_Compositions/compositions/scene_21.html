  <div class="s21-badge">🪟 核心参数②</div>
  <div class="s21-h2">-p = 在厨房墙上开一个外卖窗口</div>
  <div class="s21-body">
    <div class="s21-left">
      <div class="s21-card">
        <h4>端口映射的作用</h4>
        <p><code style="background:#e8e8e8;padding:2px 8px;border-radius:4px;font-family:monospace;font-size:16px;">-p 8010:8010</code> 相当于在厨房墙上开了一个外卖窗口</p>
      </div>
      <div class="s21-card">
        <h4>工作原理</h4>
        <p>外面的人可以通过8010号窗口点餐和取餐</p>
      </div>
      <div class="s21-card">
        <h4>后续用途</h4>
        <p>我们用curl测试的时候，就是通过这个端口访问容器里的模型服务</p>
      </div>
    </div>

        <div style="font-size:14px;color:#999;">外面的人通过8010点餐取餐</div>
      </div>
