<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s4"] {

.s4-visual .arrow-text { font-size: 28px; color: #00BFA5; }
.s4-visual .stat { font-size: 18px; color: #555; }
.s4-visual .compare { font-size: 16px; color: #888; margin-top: 8px; padding: 6px 16px; background: #f0f0f0; border-radius: 6px; }
.s4-right { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
.s4-card { background: #f8f9fa; border-radius: 12px; padding: 14px 20px; }
.s4-card h4 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
.s4-card p { font-size: 18px; color: #444; line-height: 1.55; }
.s4-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #99a; }
</style>
