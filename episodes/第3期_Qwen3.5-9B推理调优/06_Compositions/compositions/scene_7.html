<div data-composition-id="s7" data-width="1920" data-height="1080">
  <div class="s7-badge">📄 分页式管理</div>
  <div class="s7-h2">PagedAttention = 分页式草稿纸</div>
  <div class="s7-body">
    <div class="s7-left">
      <div class="s7-card">
        <h4>❌ 问题：草稿纸一次铺满桌</h4>
        <p>大模型回答时产生大量中间工作记忆，像解复杂数学题时写满中间步骤的草稿纸。没有vLLM时，模型一次性把所有草稿纸铺在桌上，桌多大用多大，铺不下就卡住。</p>
      </div>
      <div class="s7-card">
        <h4>✅ PagedAttention 解法</h4>
        <p>像操作系统管理电脑内存一样，把草稿纸分成一页一页。当前需要哪页取哪页，不用的先收起来放回抽屉里。同样大小的桌子就能同时服务更多人的计算需求。</p>
      </div>
    </div>
    <div class="s7-right">
      <div class="s7-visual">
        <div class="v-row"><span>🗄️</span> <span class="v-arrow">→</span> <span>📄</span> <span class="v-arrow">→</span> <span>🗄️</span></div>
        <div class="v-label">抽屉 → 桌面 → 抽屉</div>
        <div style="margin-top:8px;font-size:14px;color:#999;">分页式草稿纸管理</div>
      </div>
    </div>
  </div>
  <div class="s7-page">07/37</div>
</div>
