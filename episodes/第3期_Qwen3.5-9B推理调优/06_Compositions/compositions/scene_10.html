<div data-composition-id="s10" data-width="1920" data-height="1080">
  <div class="s10-badge">📊 核心性能指标</div>
  <div class="s10-h2">零百加速 vs 极速</div>
  <div class="s10-body">
    <div class="s10-col">
      <div class="s10-col-title">🏎️ 首token延迟</div>
      <ul class="s10-list">
        <li><span class="em">类比：</span>零百加速（0-100km/h）</li>
        <li><span class="em">定义：</span>输入完问题到模型说出第一个字之间等了多久</li>
        <li><span class="em">目标：</span>最好控制在一秒以内</li>
        <li><span class="em">影响：</span>数值越小，对话越流畅越跟手</li>
      </ul>
    </div>
    <div class="s10-col">
      <div class="s10-col-title" style="color:#00BFA5;">🚀 吞吐量</div>
      <ul class="s10-list">
        <li><span class="em">类比：</span>发动机排量 / 极速</li>
        <li><span class="em">定义：</span>模型每秒钟能输出多少个字</li>
        <li><span class="em">影响：</span>吞吐量越大，拿到结果越快</li>
        <li><span class="em">衡量：</span>tokens per second</li>
      </ul>
    </div>
  </div>
  <div class="s10-page">10/37</div>
</div>
