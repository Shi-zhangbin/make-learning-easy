<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s34"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: #ffffff; display: flex; flex-direction: column; padding: 60px 80px;
}
.s34-badge {
  display: inline-block; background: #00BFA5; color: #fff; font-size: 17px;
  padding: 4px 14px; border-radius: 20px; align-self: flex-start; margin-bottom: 12px;
}
.s34-h2 { font-size: 54px; font-weight: 700; color: #1a1a2e; margin-bottom: 28px; }
.s34-table {
  width: 100%; border-collapse: separate; border-spacing: 0;
  border-radius: 12px; overflow: hidden;
}
.s34-table th {
  font-size: 20px; font-weight: 700; padding: 14px 20px; text-align: left;
}
.s34-table th:first-child { background: #f8f9fa; color: #1a1a2e; }
.s34-table th:nth-child(2) { background: #fff5f5; color: #e53e3e; }
.s34-table th:nth-child(3) { background: #f0fff4; color: #00BFA5; }
.s34-table th:last-child { background: #f0fff4; color: #00BFA5; }
.s34-table td {
  font-size: 18px; padding: 16px 20px; border-top: 1px solid #eee;
}
.s34-table td:first-child { background: #f8f9fa; font-weight: 600; color: #1a1a2e; }
.s34-table td:nth-child(2) { background: #fffafa; color: #666; }
.s34-table td:nth-child(3) { background: #fafff8; color: #1a1a2e; font-weight: 600; }
.s34-table td:last-child { background: #fafff8; color: #00BFA5; font-weight: 700; }
.s34-conclusion {
  margin-top: 24px; display: flex; gap: 20px;
}
.s34-conclusion-item {
  flex: 1; background: #f8f9fa; border-radius: 12px; padding: 16px 20px;
  display: flex; align-items: flex-start; gap: 12px;
}
.s34-conclusion-item .icon { font-size: 28px; flex-shrink: 0; }
.s34-conclusion-item .text { font-size: 18px; color: #444; line-height: 1.4; }
.s34-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #99a; }
</style>
</head>
<body>
<div data-composition-id="s34" data-width="1920" data-height="1080">
  <div class="s34-badge">📈 改装前后对比</div>
  <div class="s34-h2">肉眼可见的性能提升</div>
  <table class="s34-table">
    <tr>
      <th>指标</th>
      <th>调优前（默认）</th>
      <th>调优后</th>
      <th>提升</th>
    </tr>
    <tr>
      <td>首token延迟</td>
      <td>~0.5-1.0秒</td>
      <td>~0.2秒</td>
      <td>⚡ 快3-5倍</td>
    </tr>
    <tr>
      <td>输出速度</td>
      <td>基础</td>
      <td>明显更快</td>
      <td>🚀 显著提升</td>
    </tr>
    <tr>
      <td>上下文长度</td>
      <td>5000 tokens</td>
      <td>2000 tokens</td>
      <td>➖ 够用</td>
    </tr>
    <tr>
      <td>并发能力</td>
      <td>128</td>
      <td>64</td>
      <td>➖ 够用</td>
    </tr>
  </table>
  <div class="s34-conclusion">
    <div class="s34-conclusion-item">
      <div class="icon">🏎️</div>
      <div class="text">不需要换硬件，不需要换模型，只改一两个参数就有肉眼可见的速度提升</div>
    </div>
    <div class="s34-conclusion-item">
      <div class="icon">⚖️</div>
      <div class="text">调优的本质：在资源约束下找到最适合你使用场景的配置</div>
    </div>
  </div>
  <div class="s34-page">34/37</div>
</div>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  var sc = '[data-composition-id="s34"]';
  tl.from(sc+' .s34-badge', {opacity:0, y:-10, duration:0.3});
  tl.from(sc+' .s34-h2', {opacity:0, y:-15, duration:0.4}, '-=0.2');
  tl.from(sc+' .s34-table tr', {opacity:0, y:10, stagger:0.08, duration:0.3, ease:'power2.out'}, '-=0.2');
  tl.from(sc+' .s34-conclusion-item', {opacity:0, y:15, stagger:0.12, duration:0.35, ease:'power2.out'}, '-=0.15');
  window.__timelines = window.__timelines || {};
  window.__timelines["s34"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s34"] = {duration:30.0, seek:function(t){var tl=window.__timelines&&window.__timelines["s34"];if(tl)tl.seek(t);}};
})();
</script>
</body>
</html>
