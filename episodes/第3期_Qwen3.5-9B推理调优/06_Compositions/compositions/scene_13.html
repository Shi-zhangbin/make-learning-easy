<div data-composition-id="s13" data-width="1920" data-height="1080">
  <div class="s13-badge">🔑 第一步：看车</div>
  <div class="s13-h2">SSH = 钥匙打开远程机房的门</div>
  <div class="s13-body">
    <div class="s13-left">
      <div class="s13-card">
        <h4>为什么需要SSH</h4>
        <p>实操使用的服务器可能不在你身边，可能是云上的一台远程机器</p>
      </div>
      <div class="s13-card">
        <h4>SSH是什么</h4>
        <p>坐在自己的电脑前就能操作千里之外的机器，就像用钥匙打开远程机房的门</p>
      </div>
      <div class="s13-card">
        <h4>基本命令</h4>
        <p><code>ssh username@服务器IP</code></p>
      </div>
    </div>
    <div class="s13-right">
      <div class="s13-visual">
        <div class="v-icon">🔑</div>
        <div class="v-title">SSH连接</div>
        <div class="v-desc">本地电脑 → 🔒 远程服务器<br>一把钥匙打开远程机房的门</div>
      </div>
    </div>
  </div>
  <div class="s13-page">13/37</div>
</div>
