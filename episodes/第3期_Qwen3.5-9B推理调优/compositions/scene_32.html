<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s32"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: #ffffff; display: flex; flex-direction: column; padding: 60px 80px;
}
.s32-badge {
  display: inline-block; background: #ff6b35; color: #fff; font-size: 17px;
  padding: 4px 14px; border-radius: 20px; align-self: flex-start; margin-bottom: 12px;
}
.s32-h2 { font-size: 54px; font-weight: 700; color: #1a1a2e; margin-bottom: 32px; }
.s32-columns { display: flex; gap: 40px; flex: 1; }
.s32-col { flex: 1; display: flex; flex-direction: column; gap: 16px; }
.s32-col-title {
  font-size: 26px; font-weight: 700; padding: 14px 20px; border-radius: 12px;
  text-align: center;
}
.s32-col.comfort .s32-col-title { background: #e8f0fe; color: #1a73e8; }
.s32-col.sport .s32-col-title { background: #fef3e2; color: #ff6b35; }
.s32-card {
  background: #f8f9fa; border-radius: 12px; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 6px;
}
.s32-card .icon { font-size: 20px; }
.s32-card .text { font-size: 18px; color: #444; line-height: 1.4; }
.s32-col.comfort .s32-card { border-left: 4px solid #1a73e8; }
.s32-col.sport .s32-card { border-left: 4px solid #ff6b35; }
.s32-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #99a; }
</style>
</head>
<body>
<div data-composition-id="s32" data-width="1920" data-height="1080">
  <div class="s32-badge">🏎️ 第五步：改装</div>
  <div class="s32-h2">从舒适模式切换到运动模式</div>
  <div class="s32-columns">
    <div class="s32-col comfort">
      <div class="s32-col-title">🚗 默认参数（舒适模式）</div>
      <div class="s32-card"><div class="icon">🚗</div><div class="text">偏保守、偏综合</div></div>
      <div class="s32-card"><div class="icon">🚗</div><div class="text">确保各种场景稳定运行</div></div>
      <div class="s32-card"><div class="icon">🚗</div><div class="text">悬挂软、油门延迟、换挡平顺</div></div>
    </div>
    <div class="s32-col sport">
      <div class="s32-col-title">🏎️ 调优后（运动模式）</div>
      <div class="s32-card"><div class="icon">🏎️</div><div class="text">关掉不需要的功能</div></div>
      <div class="s32-card"><div class="icon">🏎️</div><div class="text">释放资源给推理计算本身</div></div>
      <div class="s32-card"><div class="icon">🏎️</div><div class="text">悬挂变硬、油门响应快、换挡时机推迟</div></div>
    </div>
  </div>
  <div class="s32-page">32/37</div>
</div>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  var sc = '[data-composition-id="s32"]';
  tl.from(sc+' .s32-badge', {opacity:0, y:-10, duration:0.3});
  tl.from(sc+' .s32-h2', {opacity:0, y:-15, duration:0.4}, '-=0.2');
  tl.from(sc+' .s32-col.comfort .s32-card', {opacity:0, x:-30, stagger:0.12, duration:0.4, ease:'power2.out'}, '-=0.15');
  tl.from(sc+' .s32-col.sport .s32-card', {opacity:0, x:30, stagger:0.12, duration:0.4, ease:'power2.out'}, '-=0.3');
  window.__timelines = window.__timelines || {};
  window.__timelines["s32"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s32"] = {duration:25.0, seek:function(t){var tl=window.__timelines&&window.__timelines["s32"];if(tl)tl.seek(t);}};
})();
</script>
