<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s18"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: #ffffff; display: flex; flex-direction: column; padding: 60px 80px;
}
.s18-badge {
  display: inline-block; background: #00BFA5; color: #fff; font-size: 17px;
  padding: 4px 14px; border-radius: 20px; align-self: flex-start; margin-bottom: 12px;
}
.s18-h2 { font-size: 54px; font-weight: 700; color: #1a1a2e; margin-bottom: 24px; }
.s18-code {
  background: #13131a; border-radius: 12px; padding: 24px 28px; font-family: 'Courier New', monospace;
  font-size: 18px; line-height: 1.6; color: #e0e0e0; white-space: pre; overflow-x: auto;
}
.s18-code .cmt { color: #6a9955; }
.s18-code .hl { color: #00BFA5; }
.s18-list { margin-top: 20px; list-style: none; display: flex; flex-direction: column; gap: 10px; }
.s18-list li { font-size: 18px; color: #444; padding: 10px 16px; background: #f8f9fa; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
.s18-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #99a; }
</style>
</head>
<body>
<div data-composition-id="s18" data-width="1920" data-height="1080">
  <div class="s18-badge">📦 拉取镜像</div>
  <div class="s18-h2">docker pull = 网上下单预制厨房</div>
  <div class="s18-code"><span class="cmt"># 拉取包含昇腾+vLLM的镜像</span>
docker pull your-registry/qwen-ascend:<span class="hl">vllm-latest</span></div>
  <ul class="s18-list">
    <li>📋 里面锅碗瓢盆灶台烟机全配好了</li>
    <li>📋 直接送到家（下载到本地）</li>
    <li>⏱ 下载可能需要几分钟，取决于网速（可以去接杯水）</li>
  </ul>
  <div class="s18-page">18/37</div>
</div>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  var sc = '[data-composition-id="s18"]';
  tl.from(sc+' .s18-badge', {opacity:0, y:-10, duration:0.3});
  tl.from(sc+' .s18-h2', {opacity:0, y:-15, duration:0.4}, '-=0.2');
  tl.from(sc+' .s18-code', {opacity:0, y:15, duration:0.5, ease:'power2.out'}, '-=0.2');
  tl.from(sc+' .s18-list li', {opacity:0, y:10, stagger:0.1, duration:0.3, ease:'power2.out'}, '-=0.15');
  window.__timelines = window.__timelines || {};
  window.__timelines["s18"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s18"] = {duration:30.0, seek:function(t){var tl=window.__timelines&&window.__timelines["s18"];if(tl)tl.seek(t);}};
})();
</script>
</body>
</html>
