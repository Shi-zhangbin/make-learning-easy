<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s15"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: #ffffff; display: flex; flex-direction: column; padding: 60px 80px;
}
.s15-badge {
  display: inline-block; background: #00BFA5; color: #fff; font-size: 17px;
  padding: 4px 14px; border-radius: 20px; align-self: flex-start; margin-bottom: 12px;
}
.s15-h2 { font-size: 54px; font-weight: 700; color: #1a1a2e; margin-bottom: 28px; }
.s15-chart { display: flex; gap: 20px; margin-bottom: 24px; align-items: flex-end; flex-shrink: 0; }
.s15-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.s15-bar-label { font-size: 15px; color: #666; font-weight: 600; }
.s15-bar-bg { width: 100%; height: 200px; background: #f0f0f0; border-radius: 8px; position: relative; overflow: hidden; }
.s15-bar-fill { position: absolute; bottom: 0; left: 0; right: 0; border-radius: 8px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 14px; color: #fff; font-weight: 700; }
.s15-bar-fill.used { background: linear-gradient(to top, #1a73e8, #00BFA5); }
.s15-bar-fill.total { background: rgba(0,191,165,0.2); }
.s15-meta { display: flex; gap: 24px; flex-shrink: 0; }
.s15-meta-card { flex: 1; background: #f8f9fa; border-radius: 12px; padding: 12px 18px; text-align: center; }
.s15-meta-card .val { font-size: 22px; font-weight: 700; color: #1a1a2e; }
.s15-meta-card .lbl { font-size: 15px; color: #888; margin-top: 2px; }
.s15-meta-card .ok { color: #00BFA5; }
.s15-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #99a; }
</style>
</head>
<body>
<div data-composition-id="s15" data-width="1920" data-height="1080">
  <div class="s15-badge">📊 看懂仪表盘</div>
  <div class="s15-h2">HBM那一栏就是你的"油表"</div>
  <div class="s15-chart">
    <div class="s15-bar-wrap"><div class="s15-bar-label">卡0</div><div class="s15-bar-bg"><div class="s15-bar-fill used" style="height:96%;">30.8/32GB</div></div></div>
    <div class="s15-bar-wrap"><div class="s15-bar-label">卡1</div><div class="s15-bar-bg"><div class="s15-bar-fill used" style="height:89%;">28.5/32GB</div></div></div>
    <div class="s15-bar-wrap"><div class="s15-bar-label">卡2</div><div class="s15-bar-bg"><div class="s15-bar-fill used" style="height:98%;">31.2/32GB</div></div></div>
    <div class="s15-bar-wrap"><div class="s15-bar-label">卡3</div><div class="s15-bar-bg"><div class="s15-bar-fill used" style="height:91%;">29.0/32GB</div></div></div>
  </div>
  <div class="s15-meta">
    <div class="s15-meta-card"><div class="val ok">0-3</div><div class="lbl">卡号，4张在线 ✅</div></div>
    <div class="s15-meta-card"><div class="val">HBM</div><div class="lbl">显存大小和已用量</div></div>
    <div class="s15-meta-card"><div class="val">40-60°C</div><div class="lbl">Temp 正常范围</div></div>
    <div class="s15-meta-card"><div class="val">4</div><div class="lbl">设备总数 ✅ 在线</div></div>
  </div>
  <div class="s15-page">15/37</div>
</div>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  var sc = '[data-composition-id="s15"]';
  tl.from(sc+' .s15-badge', {opacity:0, y:-10, duration:0.3});
  tl.from(sc+' .s15-h2', {opacity:0, y:-15, duration:0.4}, '-=0.2');
  tl.from(sc+' .s15-bar-wrap', {opacity:0, y:20, stagger:0.1, duration:0.4, ease:'power2.out'}, '-=0.2');
  tl.from(sc+' .s15-meta-card', {opacity:0, y:15, stagger:0.08, duration:0.3, ease:'power2.out'}, '-=0.2');
  window.__timelines = window.__timelines || {};
  window.__timelines["s15"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s15"] = {duration:25.0, seek:function(t){var tl=window.__timelines&&window.__timelines["s15"];if(tl)tl.seek(t);}};
})();
</script>
</body>
</html>
