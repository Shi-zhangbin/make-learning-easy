<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s12"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: #ffffff; display: flex; flex-direction: column; padding: 60px 80px;
}
.s12-badge {
  display: inline-block; background: #00BFA5; color: #fff; font-size: 17px;
  padding: 4px 14px; border-radius: 20px; align-self: flex-start; margin-bottom: 12px;
}
.s12-h2 { font-size: 54px; font-weight: 700; color: #1a1a2e; margin-bottom: 32px; }
.s12-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex: 1; align-content: start; }
.s12-card { background: #f8f9fa; border-radius: 12px; padding: 18px 22px; }
.s12-card h4 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.s12-card p { font-size: 18px; color: #444; line-height: 1.5; }
.s12-card .meta { font-size: 15px; color: #888; margin-top: 6px; }
.s12-card .hl-green { color: #00BFA5; font-weight: 600; }
.s12-card .hl-blue { color: #1a73e8; font-weight: 600; }
.s12-card.border-green { border-left: 4px solid #00BFA5; }
.s12-card.border-blue { border-left: 4px solid #1a73e8; }
.s12-card.border-orange { border-left: 4px solid #ff6b35; }
.s12-card.border-purple { border-left: 4px solid #9c27b0; }
.s12-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #99a; }
</style>
</head>
<body>
<div data-composition-id="s12" data-width="1920" data-height="1080">
  <div class="s12-badge">🔧 改装旋钮</div>
  <div class="s12-h2">今天动手的三个核心开关</div>
  <div class="s12-grid">
    <div class="s12-card border-green">
      <h4>🏎️ tensor-parallel-size</h4>
      <p><span class="hl-green">类比：</span>发动机缸数。4张NPU卡 = V4发动机，设成4就是四个气缸同时工作</p>
      <div class="meta">取值范围：1-4</div>
    </div>
    <div class="s12-card border-blue">
      <h4>⛽ max-model-len</h4>
      <p><span class="hl-blue">类比：</span>油箱容量。模型能记住多长的前文。数值越大占显存越多</p>
      <div class="meta">默认值：5000</div>
    </div>
    <div class="s12-card border-orange">
      <h4>🚗 max-num-seqs</h4>
      <p><span class="hl-green">类比：</span>一次拉几个乘客。并发请求数。数值越大并发越高，显存压力越大</p>
      <div class="meta">默认值：128</div>
    </div>
    <div class="s12-card border-purple">
      <h4>⚖️ 三者关系</h4>
      <p><span class="hl-green">权衡：</span>三个参数共享显存资源，调大一个往往意味着调小另一个</p>
      <p><span class="hl-green">核心原则：</span>根据实际使用场景找到最佳平衡点</p>
    </div>
  </div>
  <div class="s12-page">12/37</div>
</div>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  var sc = '[data-composition-id="s12"]';
  tl.from(sc+' .s12-badge', {opacity:0, y:-10, duration:0.3});
  tl.from(sc+' .s12-h2', {opacity:0, y:-15, duration:0.4}, '-=0.2');
  tl.from(sc+' .s12-card', {opacity:0, y:20, stagger:0.1, duration:0.4, ease:'power2.out'}, '-=0.15');
  window.__timelines = window.__timelines || {};
  window.__timelines["s12"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s12"] = {duration:35.0, seek:function(t){var tl=window.__timelines&&window.__timelines["s12"];if(tl)tl.seek(t);}};
})();
</script>
</body>
</html>
