<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s37"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 120px; text-align: center;
}
.s37-h2 {
  font-size: 64px; font-weight: 800; color: #ffffff;
  margin-bottom: 32px; line-height: 1.2;
}
.s37-h2 .hl { color: #00BFA5; }
.s37-preview {
  max-width: 80%; margin-bottom: 36px;
}
.s37-preview-item {
  display: inline-flex; align-items: center; gap: 14px;
  background: rgba(255,255,255,0.06); border-radius: 12px;
  padding: 14px 24px; margin: 6px 8px;
}
.s37-preview-item .icon { font-size: 28px; }
.s37-preview-item .text { font-size: 20px; color: #c9d1d9; }
.s37-cta {
  background: #00BFA5; color: #fff; font-size: 22px; font-weight: 700;
  padding: 16px 40px; border-radius: 12px; margin-bottom: 16px;
}
.s37-end {
  font-size: 20px; color: #8b949e;
  font-style: italic;
}
.s37-series {
  position: absolute; bottom: 40px;
  font-size: 18px; color: #484f58;
}
.s37-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #484f58; }
</style>
</head>
<body>
<div data-composition-id="s37" data-width="1920" data-height="1080">
  <div class="s37-badge" style="display:inline-block;background:#00BFA5;color:#fff;font-size:17px;padding:6px 20px;border-radius:20px;margin-bottom:20px;">📺 下期预告</div>
  <div class="s37-h2">下期预告：<span class="hl">从零构建Docker镜像</span></div>
  <div class="s37-preview">
    <div class="s37-preview-item"><div class="icon">🔧</div><div class="text">自己编译vLLM</div></div>
    <div class="s37-preview-item"><div class="icon">📦</div><div class="text">安装昇腾CANN</div></div>
    <div class="s37-preview-item"><div class="icon">🐍</div><div class="text">配置Python依赖</div></div>
    <div class="s37-preview-item"><div class="icon">🔬</div><div class="text">看镜像每一层</div></div>
  </div>
  <div class="s37-cta">关掉这个视频，打开你的终端，把今天这五步敲一遍</div>
  <div class="s37-end">动手是最好的学习方式</div>
  <div class="s37-series">启明 AI 实操系列 · 第3期</div>
  <div class="s37-page">37/37</div>
</div>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  var sc = '[data-composition-id="s37"]';
  tl.from(sc+' .s37-badge', {opacity:0, y:-20, duration:0.3});
  tl.from(sc+' .s37-h2', {opacity:0, y:-20, duration:0.4, ease:'power2.out'}, '-=0.2');
  tl.from(sc+' .s37-preview-item', {opacity:0, scale:0.5, stagger:0.12, duration:0.35, ease:'back.out(1.3)'}, '-=0.2');
  tl.from(sc+' .s37-cta', {opacity:0, y:15, duration:0.4, ease:'power2.out'}, '-=0.2');
  tl.from(sc+' .s37-end', {opacity:0, y:10, duration:0.3, ease:'power2.out'}, '-=0.15');
  window.__timelines = window.__timelines || {};
  window.__timelines["s37"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s37"] = {duration:20.0, seek:function(t){var tl=window.__timelines&&window.__timelines["s37"];if(tl)tl.seek(t);}};
})();
</script>
</body>
</html>
