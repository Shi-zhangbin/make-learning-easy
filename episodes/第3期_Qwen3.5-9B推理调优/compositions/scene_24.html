<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s24"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 120px; text-align: center;
}
.s24-badge {
  display: inline-block; background: #ff6b35; color: #fff; font-size: 17px;
  padding: 6px 20px; border-radius: 20px; margin-bottom: 20px;
}
.s24-h2 {
  font-size: 64px; font-weight: 800; color: #ffffff;
  margin-bottom: 20px; line-height: 1.2;
}
.s24-h2 .hl { color: #00BFA5; }
.s24-sub {
  font-size: 24px; color: #8b949e;
  margin-bottom: 32px; line-height: 1.4;
}
.s24-deco {
  display: flex; gap: 24px; align-items: center; margin-top: 12px;
}
.s24-deco-item {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.s24-deco-item .icon { font-size: 48px; }
.s24-deco-item .label { font-size: 18px; color: #8b949e; }
.s24-deco-arrow { font-size: 36px; color: #00BFA5; }
.s24-version {
  position: absolute; bottom: 40px;
  font-size: 18px; color: #484f58;
}
.s24-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #484f58; }
</style>
</head>
<body>
<div data-composition-id="s24" data-width="1920" data-height="1080">
  <div class="s24-badge">🔑 第三步：点火</div>
  <div class="s24-h2">把引擎和ECU<span class="hl">真正连起来</span></div>
  <div class="s24-sub">在容器内执行 vllm serve，启动推理服务</div>
  <div class="s24-deco">
    <div class="s24-deco-item"><div class="icon">🏎️</div><div class="label">引擎</div></div>
    <div class="s24-deco-arrow">⚡</div>
    <div class="s24-deco-item"><div class="icon">⚙️</div><div class="label">vLLM 点火</div></div>
    <div class="s24-deco-arrow">⚡</div>
    <div class="s24-deco-item"><div class="icon">🔥</div><div class="label">启动成功</div></div>
  </div>
  <div class="s24-version">vLLM Ascend | 昇腾NPU</div>
  <div class="s24-page">24/37</div>
</div>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  var sc = '[data-composition-id="s24"]';
  tl.from(sc+' .s24-badge', {opacity:0, y:-20, duration:0.3});
  tl.from(sc+' .s24-h2', {opacity:0, y:-15, duration:0.5, ease:'power2.out'}, '-=0.2');
  tl.from(sc+' .s24-sub', {opacity:0, y:15, duration:0.4, ease:'power2.out'}, '-=0.2');
  tl.from(sc+' .s24-deco-item', {opacity:0, scale:0.5, stagger:0.15, duration:0.4, ease:'back.out(1.5)'}, '-=0.2');
  window.__timelines = window.__timelines || {};
  window.__timelines["s24"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s24"] = {duration:20.0, seek:function(t){var tl=window.__timelines&&window.__timelines["s24"];if(tl)tl.seek(t);}};
})();
</script>
