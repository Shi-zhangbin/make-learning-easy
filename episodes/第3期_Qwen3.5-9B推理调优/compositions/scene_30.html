<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s30"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: #ffffff; display: flex; flex-direction: column; padding: 50px 80px;
}
.s30-badge {
  display: inline-block; background: #00BFA5; color: #fff; font-size: 17px;
  padding: 4px 14px; border-radius: 20px; align-self: flex-start; margin-bottom: 10px;
}
.s30-h2 { font-size: 54px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
.s30-code {
  background: #13131a; border-radius: 12px; padding: 22px 26px; font-family: 'Courier New', monospace;
  font-size: 16px; line-height: 1.5; color: #c5d4e0; white-space: pre; overflow-x: auto;
}
.s30-code .cmt { color: #6a9955; }
.s30-code .hl { color: #00BFA5; }
.s30-code .str { color: #ce9178; }
.s30-code .key { color: #569cd6; }
.s30-params {
  margin-top: 16px; display: flex; gap: 20px;
}
.s30-param {
  flex: 1; background: #f8f9fa; border-radius: 12px; padding: 14px 18px;
}
.s30-param .label { font-size: 16px; font-weight: 700; color: #00BFA5; margin-bottom: 4px; font-family: monospace; }
.s30-param .desc { font-size: 17px; color: #444; line-height: 1.4; }
.s30-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #99a; }
</style>
</head>
<body>
<div data-composition-id="s30" data-width="1920" data-height="1080">
  <div class="s30-badge">💻 发送请求</div>
  <div class="s30-h2">完整的测试请求</div>
  <div class="s30-code">curl http://localhost:8010/v1/chat/completions \
  -H <span class="str">"Content-Type: application/json"</span> \
  -d <span class="str">'{
    <span class="key">"model"</span>: <span class="str">"qwen3.5"</span>,
    <span class="key">"messages"</span>: [
      {<span class="key">"role"</span>: <span class="str">"user"</span>, <span class="key">"content"</span>: <span class="str">"你好，请用50字介绍你自己"</span>}
    ],
    <span class="key">"max_tokens"</span>: 100
  }'</span></div>
  <div class="s30-params">
    <div class="s30-param">
      <div class="label">model</div>
      <div class="desc">指定模型名称（我们起的名字 qwen3.5）</div>
    </div>
    <div class="s30-param">
      <div class="label">messages</div>
      <div class="desc">对话历史（user角色发送消息）</div>
    </div>
    <div class="s30-param">
      <div class="label">max_tokens</div>
      <div class="desc">最多输出100个token</div>
    </div>
  </div>
  <div class="s30-page">30/37</div>
</div>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  var sc = '[data-composition-id="s30"]';
  tl.from(sc+' .s30-badge', {opacity:0, y:-10, duration:0.3});
  tl.from(sc+' .s30-h2', {opacity:0, y:-15, duration:0.4}, '-=0.2');
  tl.from(sc+' .s30-code', {opacity:0, y:15, duration:0.5, ease:'power2.out'}, '-=0.2');
  tl.from(sc+' .s30-param', {opacity:0, y:10, stagger:0.1, duration:0.3, ease:'power2.out'}, '-=0.15');
  window.__timelines = window.__timelines || {};
  window.__timelines["s30"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s30"] = {duration:30.0, seek:function(t){var tl=window.__timelines&&window.__timelines["s30"];if(tl)tl.seek(t);}};
})();
</script>
</body>
</html>
