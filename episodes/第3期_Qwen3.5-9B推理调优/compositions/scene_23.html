<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s23"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: #ffffff; display: flex; flex-direction: column; padding: 60px 80px;
}
.s23-badge {
  display: inline-block; background: #00BFA5; color: #fff; font-size: 17px;
  padding: 4px 14px; border-radius: 20px; align-self: flex-start; margin-bottom: 12px;
}
.s23-h2 { font-size: 54px; font-weight: 700; color: #1a1a2e; margin-bottom: 36px; }
.s23-steps { display: flex; flex-direction: column; gap: 10px; flex: 1; justify-content: center; }
.s23-step {
  display: flex; align-items: center; gap: 20px;
  background: #f8f9fa; border-radius: 12px; padding: 16px 24px;
  position: relative;
}
.s23-step::before {
  content: ''; position: absolute; left: 34px; top: 58px;
  width: 2px; height: calc(100% - 10px);
  background: #00BFA5; opacity: 0.3;
}
.s23-step:last-child::before { display: none; }
.s23-step-num {
  width: 40px; height: 40px; border-radius: 50%; background: #00BFA5;
  color: #fff; font-size: 18px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.s23-step-text { flex: 1; }
.s23-step-text .title { font-size: 20px; font-weight: 700; color: #1a1a2e; }
.s23-step-text .desc { font-size: 18px; color: #555; margin-top: 2px; }
.s23-step-text .code { font-family: monospace; background: #e8e8e8; padding: 2px 8px; border-radius: 4px; font-size: 16px; }
.s23-success {
  margin-top: 20px; background: #f0fff4; border-radius: 12px; padding: 16px 24px;
  display: flex; align-items: center; gap: 14px; border-left: 4px solid #00BFA5;
}
.s23-success .icon { font-size: 28px; }
.s23-success .text { font-size: 20px; font-weight: 700; color: #00BFA5; }
.s23-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #99a; }
</style>
</head>
<body>
<div data-composition-id="s23" data-width="1920" data-height="1080">
  <div class="s23-badge">🚪 进入厨房</div>
  <div class="s23-h2">敲完回车，你就进入了容器</div>
  <div class="s23-steps">
    <div class="s23-step">
      <div class="s23-step-num">1</div>
      <div class="s23-step-text">
        <div class="title">敲 <span class="code">docker run ... -it 镜像名</span></div>
        <div class="desc">带着 --device -p -v 三个参数启动容器</div>
      </div>
    </div>
    <div class="s23-step">
      <div class="s23-step-num">2</div>
      <div class="s23-step-text">
        <div class="title">等待容器启动</div>
        <div class="desc">几秒到几十秒，容器自动运行起来</div>
      </div>
    </div>
    <div class="s23-step">
      <div class="s23-step-num">3</div>
      <div class="s23-step-text">
        <div class="title">命令行提示符变化</div>
        <div class="desc"><span class="code">root@containerID:/#</span> — 你已经进到厨房里面了</div>
      </div>
    </div>
  </div>
  <div class="s23-success">
    <div class="icon">✅</div>
    <div class="text">已进入：现在所有后续操作都在这个容器里完成</div>
  </div>
  <div class="s23-page">23/37</div>
</div>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  var sc = '[data-composition-id="s23"]';
  tl.from(sc+' .s23-badge', {opacity:0, y:-10, duration:0.3});
  tl.from(sc+' .s23-h2', {opacity:0, y:-15, duration:0.4}, '-=0.2');
  tl.from(sc+' .s23-step', {opacity:0, y:20, stagger:0.15, duration:0.4, ease:'power2.out'}, '-=0.2');
  tl.from(sc+' .s23-success', {opacity:0, y:15, duration:0.4, ease:'power2.out'}, '-=0.1');
  window.__timelines = window.__timelines || {};
  window.__timelines["s23"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s23"] = {duration:25.0, seek:function(t){var tl=window.__timelines&&window.__timelines["s23"];if(tl)tl.seek(t);}};
})();
</script>
</body>
</html>
