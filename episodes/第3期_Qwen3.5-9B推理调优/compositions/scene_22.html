<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s22"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: #ffffff; display: flex; flex-direction: column; padding: 60px 80px;
}
.s22-badge {
  display: inline-block; background: #00BFA5; color: #fff; font-size: 17px;
  padding: 4px 14px; border-radius: 20px; align-self: flex-start; margin-bottom: 12px;
}
.s22-h2 { font-size: 54px; font-weight: 700; color: #1a1a2e; margin-bottom: 32px; }
.s22-columns { display: flex; gap: 40px; flex: 1; }
.s22-col { flex: 1; display: flex; flex-direction: column; gap: 16px; }
.s22-col-title {
  font-size: 26px; font-weight: 700; padding: 12px 20px; border-radius: 12px;
  text-align: center; margin-bottom: 4px;
}
.s22-col.bad .s22-col-title { background: #fff5f5; color: #e53e3e; }
.s22-col.good .s22-col-title { background: #f0fff4; color: #00BFA5; }
.s22-item {
  background: #f8f9fa; border-radius: 12px; padding: 18px 22px;
  display: flex; align-items: flex-start; gap: 12px;
}
.s22-item .icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
.s22-item .text { font-size: 18px; color: #444; line-height: 1.5; }
.s22-item .code { font-family: monospace; background: #e8e8e8; padding: 2px 8px; border-radius: 4px; font-size: 16px; display: inline-block; }
.s22-col.bad .s22-item { border-left: 4px solid #e53e3e; }
.s22-col.good .s22-item { border-left: 4px solid #00BFA5; }
.s22-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #99a; }
</style>
</head>

<div data-composition-id="s22" data-width="1920" data-height="1080">
  <div class="s22-badge">📂 核心参数③</div>
  <div class="s22-h2">-v = 防止每次重新下载模型</div>
  <div class="s22-columns">
    <div class="s22-col bad">
      <div class="s22-col-title">❌ 没有 -v</div>

    <div class="s22-col good">
      <div class="s22-col-title">✅ 有 -v</div>

      <div class="s22-item"><div class="icon">💾</div><div class="text"><span class="code">-v /本地模型路径:/容器模型路径</span></div></div>
    </div>
  </div>
  <div class="s22-page">22/37</div>
</div>
