<body>
<div data-composition-id="s20" data-width="1920" data-height="1080">
  <div class="s20-badge">🔌 核心参数①</div>
  <div class="s20-h2">--device = 把燃气管接到厨房</div>
  <div class="s20-body">
    <div class="s20-left">
      <div class="s20-visual">
        <div class="v-icon">🔌</div>
        <div class="v-title">燃气管道连接</div>
        <div class="v-pipes">
          <div class="s20-visual .v-pipe">davinci0</div>
          <div class="s20-visual .v-pipe" style="background:#ff8c5a;">davinci1</div>
          <div class="s20-visual .v-pipe" style="background:#ffa07a;">davinci2</div>
          <div class="s20-visual .v-pipe" style="background:#ffb599;">davinci3</div>
        </div>
        <div class="v-labels">宿主机 → 容器</div>
        <div style="font-size:14px;color:#999;margin-top:4px;">四根燃气管接到厨房</div>
      </div>
    </div>
    <div class="s20-right">
      <div class="s20-card">
        <h4>为什么需要 --device</h4>
        <p>Docker默认是隔离的，容器不知道外面有NPU卡的存在，就像厨房里没有燃气管道</p>
      </div>
      <div class="s20-card">
        <h4>具体写法</h4>
        <p><code>--device /dev/davinci0-3</code> 把你外面机器的四根燃气管接到厨房里</p>
      </div>
      <div class="s20-card">
        <h4>等于说</h4>
        <p>容器内的程序能直接调用外面的NPU卡了</p>
      </div>
    </div>
  </div>
  <div class="s20-page">20/37</div>
</div>
