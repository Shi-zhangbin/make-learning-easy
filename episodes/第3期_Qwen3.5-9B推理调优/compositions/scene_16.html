<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; overflow: hidden; }
[data-composition-id="s16"] {
  width: 1920px; height: 1080px; position: relative; overflow: hidden;
  background: #ffffff; display: flex; flex-direction: column; padding: 80px 120px;
  align-items: center; justify-content: center;
}
.s16-badge {
  display: inline-block; background: #00BFA5; color: #fff; font-size: 17px;
  padding: 4px 14px; border-radius: 20px; margin-bottom: 16px;
}
.s16-h2 { font-size: 54px; font-weight: 700; color: #1a1a2e; text-align: center; margin-bottom: 40px; }
.s16-quote-box {
  background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 16px;
  padding: 40px 52px; max-width: 1200px; position: relative;
}
.s16-quote-box::before { content: '"'; position: absolute; top: 8px; left: 18px; font-size: 72px; color: #00BFA5; opacity: 0.4; font-family: serif; line-height: 1; }
.s16-quote-text { font-size: 24px; color: #e0e0e0; line-height: 1.6; text-align: center; }
.s16-quote-text .hl { color: #00BFA5; }
.s16-footer { display: flex; gap: 30px; margin-top: 32px; }
.s16-footer-item { display: flex; align-items: center; gap: 8px; font-size: 18px; color: #666; padding: 10px 18px; background: #f8f9fa; border-radius: 30px; }
.s16-page { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: #99a; }
</style>
</head>
<body>
<div data-composition-id="s16" data-width="1920" data-height="1080">
  <div class="s16-badge">💡 好习惯</div>
  <div class="s16-h2">赛车手的发车仪式</div>
  <div class="s16-quote-box">
    <div class="s16-quote-text">
      每次跑模型之前先 <span class="hl">`npu-smi info`</span> 看一眼。就像赛车手发车前先看一遍胎压和油温水温，<br>跳过这一步后面出了问题你根本不知道是硬件问题还是软件问题。
    </div>
  </div>
  <div class="s16-footer">
    <span class="s16-footer-item">✅ 硬件状态确认</span>
    <span class="s16-footer-item">➡️ 减少排错时间</span>
    <span class="s16-footer-item">💪 养成肌肉记忆</span>
  </div>
  <div class="s16-page">16/37</div>
</div>
<script>
(function(){
  var tl = gsap.timeline({paused:true});
  var sc = '[data-composition-id="s16"]';
  tl.from(sc+' .s16-badge', {opacity:0, y:-10, duration:0.3});
  tl.from(sc+' .s16-h2', {opacity:0, y:-15, duration:0.4}, '-=0.2');
  tl.from(sc+' .s16-quote-box', {opacity:0, scale:0.95, duration:0.5, ease:'power2.out'}, '-=0.2');
  tl.from(sc+' .s16-footer-item', {opacity:0, y:10, stagger:0.1, duration:0.3, ease:'power2.out'}, '-=0.2');
  window.__timelines = window.__timelines || {};
  window.__timelines["s16"] = tl;
  window.__hf = window.__hf || {};
  window.__hf["s16"] = {duration:25.0, seek:function(t){var tl=window.__timelines&&window.__timelines["s16"];if(tl)tl.seek(t);}};
})();
</script>
</body>
</html>
