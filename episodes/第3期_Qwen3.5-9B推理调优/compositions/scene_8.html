<body>
<div data-composition-id="s8" data-width="1920" data-height="1080">
  <div class="s8-badge">🔄 流水线作业</div>
  <div class="s8-h2">Continuous Batching = 餐厅实时翻台</div>
  <div class="s8-body">
    <div class="s8-left">
      <div class="s8-visual">
        <div class="v-row">🍽️ 🔄 🍽️</div>
        <div class="v-label">餐厅翻台流程</div>
        <div style="font-size:14px;color:#999;margin-top:8px;">客人→上菜→加菜→翻台…</div>
      </div>
    </div>
    <div class="s8-right">
      <div class="s8-card">
        <h4>❌ 传统做法（一张桌子等一桌）</h4>
        <p>等一个用户的请求完全处理完，再处理下一个。像一家餐馆只有一张桌子，等这桌吃完结账走，才让下一桌进来。</p>
      </div>
      <div class="s8-card">
        <h4>✅ 连续批处理（实时翻台）</h4>
        <p>桌子可以实时翻台——新的客人刚到就先上菜，前一桌还没吃完已经在加菜了，厨房一直在炒，流水线一样不停。整体效率大大提升。</p>
      </div>
    </div>
  </div>
  <div class="s8-page">08/37</div>
</div>
