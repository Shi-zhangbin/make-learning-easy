<div data-composition-id="s11" data-width="1920" data-height="1080">
  <div class="s11-badge">⛽ 关键资源</div>
  <div class="s11-h2">显存 = 油箱</div>
  <div class="s11-body">
    <div class="s11-left">
      <div class="s11-card">
        <h4>什么是显存</h4>
        <p>NPU芯片上的专用内存，模型的所有参数和中间计算结果都放在显存里</p>
      </div>
      <div class="s11-card">
        <h4>显存不够会怎样</h4>
        <p>就像油箱太小跑不了长途——模型加载失败或推理速度骤降</p>
      </div>
      <div class="s11-card">
        <h4>本机配置</h4>
        <p>4张昇腾NPU卡，每张显存24G-32G</p>
      </div>
    </div>
    <div class="s11-right">
      <div class="s11-visual">
        <div class="v-icon">⛽</div>
        <div class="v-title">油箱容量表</div>
        <div class="v-npus">
          <div class="s11-visual .v-npu">NPU0</div>
        </div>
        <div style="font-size:14px;color:#999;">4张NPU卡示意</div>
      </div>
    </div>
  </div>
  <div class="s11-page">11/37</div>
</div>
