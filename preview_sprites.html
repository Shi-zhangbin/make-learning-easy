<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Learning Easy — 精灵动画预览</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f0f1a; font-family:'Segoe UI',system-ui,sans-serif; color:#e0e0e0; padding:30px; }
  h1 { font-size:28px; margin-bottom:6px; color:#fff; }
  .subtitle { color:#888; margin-bottom:30px; font-size:14px; }

  /* Controls */
  .controls { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:30px; }
  .controls label { font-size:13px; color:#999; }
  .controls select, .controls button {
    padding:8px 16px; border-radius:8px; border:1px solid #333; background:#1a1a2e;
    color:#e0e0e0; font-size:14px; cursor:pointer; outline:none;
  }
  .controls select:hover, .controls button:hover { border-color:#FB7299; }
  .controls button { background:#FB7299; color:#fff; border:none; font-weight:600; }
  .controls button:hover { background:#ff8aad; }

  /* Preview panel */
  .preview { background:#1a1a2e; border-radius:12px; padding:30px; margin-bottom:20px; border:1px solid #2a2a3e; }
  .scene-label { font-size:12px; color:#666; margin-bottom:8px; }

  /* Progress bar area */
  .progress-area {
    position:relative; width:100%; height:80px;
    background:linear-gradient(to top,#2a2a3e 0%,#1a1a2e 100%);
    border-radius:8px; overflow:hidden; border:1px solid #333;
  }
  .progress-track { position:absolute; bottom:20px; left:30px; right:30px; height:4px; background:#333; border-radius:2px; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#FB7299,#ff8aad); border-radius:2px; width:0%; transition:none; }
  .progress-label { position:absolute; bottom:4px; right:30px; font-size:11px; color:#666; font-feature-settings:'tnum'; }

  /* Sprite dancer */
  .dancer {
    position:absolute; bottom:8px; width:60px; height:60px;
    background-size:540px 60px; image-rendering:auto;
    transform:translateX(-30px); z-index:10;
    transition: none;
    pointer-events:none;
  }

  /* Stats */
  .stats { display:flex; gap:20px; margin-top:16px; font-size:13px; color:#888; }
  .stats span { background:#0f0f1a; padding:4px 12px; border-radius:6px; }

  /* Sprite strip viewer */
  .strip-viewer { background:#1a1a2e; border-radius:12px; padding:20px; border:1px solid #2a2a3e; margin-bottom:20px; }
  .strip-viewer h3 { font-size:14px; color:#999; margin-bottom:12px; }
  .strip-container { display:flex; gap:2px; overflow-x:auto; padding:10px; background:#0f0f1a; border-radius:8px; }
  .strip-container img { width:60px; height:60px; image-rendering:auto; border-radius:4px; background:#333; flex-shrink:0; }
  .frame-label { text-align:center; font-size:10px; color:#555; margin-top:4px; }

  /* Sprite grid selector */
  .sprite-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:10px; margin-bottom:20px; }
  .sprite-card {
    background:#1a1a2e; border:2px solid #2a2a3e; border-radius:10px; padding:12px;
    text-align:center; cursor:pointer; transition:all .15s;
  }
  .sprite-card:hover { border-color:#FB7299; transform:translateY(-2px); }
  .sprite-card.active { border-color:#FB7299; background:#2a1a2e; }
  .sprite-card img { width:60px; height:60px; image-rendering:auto; border-radius:4px; margin-bottom:6px; background:#0f0f1a; }
  .sprite-card .name { font-size:13px; font-weight:600; color:#e0e0e0; }
  .sprite-card .action { font-size:11px; color:#888; }

  /* All sprites gallery */
  .gallery { background:#1a1a2e; border-radius:12px; padding:20px; border:1px solid #2a2a3e; }
  .gallery h3 { font-size:14px; color:#999; margin-bottom:16px; }
  .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
  .gallery-card { background:#0f0f1a; border-radius:8px; padding:16px; text-align:center; }
  .gallery-card img { width:270px; height:60px; image-rendering:auto; border-radius:4px; background:#333; margin-bottom:8px; }
  .gallery-card .name { font-size:14px; font-weight:600; }
  .gallery-card .desc { font-size:12px; color:#888; margin-top:2px; }
  .gallery-card .meta { font-size:11px; color:#555; margin-top:4px; }

  .speed-slider { display:flex; align-items:center; gap:12px; }
  .speed-slider input { flex:1; max-width:200px; accent-color:#FB7299; }
</style>
</head>
<body>

<h1>🏃 精灵动画预览</h1>
<p class="subtitle">进度条跑步小人 — 所有动画与进度条动作同步</p>

<!-- Controls -->
<div class="controls">
  <label>精灵风格:</label>
  <select id="styleSelect">
    <option value="">— 请选择 —</option>
  </select>
  <button id="playBtn">▶ 播放</button>
  <button id="resetBtn">⟳ 重置</button>
  <div class="speed-slider">
    <label>速度:</label>
    <input type="range" id="speedSlider" min="0.25" max="4" step="0.25" value="1">
    <span id="speedLabel">1×</span>
  </div>
</div>

<!-- Preview -->
<div class="preview">
  <div class="scene-label">进度条动画预览</div>
  <div class="progress-area" id="progressArea">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="dancer" id="dancer"></div>
    <span class="progress-label" id="progressLabel">0%</span>
  </div>
  <div class="stats" id="stats">
    <span>🕒 用时: <b id="timeDisplay">0.0s</b></span>
    <span>📐 帧数: <b id="frameCount">9</b></span>
    <span>🔄 循环周期: <b id="cycleTime">1.2s</b></span>
    <span>⚡ 帧率: <b id="fpsDisplay">7.5</b> fps</span>
  </div>
</div>

<!-- Sprite strip detail -->
<div class="strip-viewer">
  <h3>📜 精灵序列帧</h3>
  <div style="display:flex; gap:4px; align-items:center;">
    <div class="strip-container" id="stripContainer"></div>
  </div>
</div>

<!-- Gallery -->
<div class="gallery">
  <h3>🎨 所有精灵动画一览</h3>
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<script>
// ── Sprite presets metadata ──
// Matches SPRITE_PRESETS in sprite_runner.py
const PRESETS = {
  boy:     { name:'小男孩',   action:'跑步',   frames:9, cycle:1.2, file:'sprite_boy.png' },
  dino:    { name:'小恐龙',   action:'跑步',   frames:9, cycle:1.2, file:'sprite_dino.png' },
  walk:    { name:'散步',     action:'行走',   frames:9, cycle:1.8, file:'sprite_walk.png' },
  cycle:   { name:'骑车',     action:'骑车',   frames:9, cycle:0.9, file:'sprite_cycle.png' },
  skateboard: { name:'滑板',  action:'滑板',   frames:9, cycle:1.0, file:'sprite_skateboard.png' },
  jump:    { name:'跳跃',     action:'跳跃',   frames:9, cycle:0.7, file:'sprite_jump.png' },
  moonwalk:{ name:'太空步',   action:'滑步',   frames:9, cycle:1.5, file:'sprite_moonwalk.png' },
  dance:   { name:'跳舞',     action:'跳舞',   frames:9, cycle:0.6, file:'sprite_dance.png' },
  fly:     { name:'飞翔',     action:'飞行',   frames:9, cycle:0.8, file:'sprite_fly.png' },
};

const SPRITE_DIR = 'v3/assets/';
const TOTAL_DUR = 5; // 5-second demo loop
let currentStyle = 'boy';
let animFrame = null;
let startTime = null;
let speed = 1;
let isPlaying = false;

const dancer = document.getElementById('dancer');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const timeDisplay = document.getElementById('timeDisplay');
const frameCount = document.getElementById('frameCount');
const cycleTime = document.getElementById('cycleTime');
const fpsDisplay = document.getElementById('fpsDisplay');
const stripContainer = document.getElementById('stripContainer');
const galleryGrid = document.getElementById('galleryGrid');
const styleSelect = document.getElementById('styleSelect');
const speedSlider = document.getElementById('speedSlider');
const speedLabel = document.getElementById('speedLabel');

// Populate selector
Object.entries(PRESETS).forEach(([key, val]) => {
  const opt = document.createElement('option');
  opt.value = key;
  opt.textContent = `${val.name} — ${val.action}`;
  styleSelect.appendChild(opt);
});

// Build gallery
Object.entries(PRESETS).forEach(([key, val]) => {
  const card = document.createElement('div');
  card.className = 'gallery-card';
  card.innerHTML = `
    <img src="${SPRITE_DIR}${val.file}" alt="${val.name}" loading="lazy"
         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22270%22 height=%2260%22><rect fill=%22%23333%22 width=%22270%22 height=%2260%22/><text x=%22135%22 y=%2235%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2212%22>生成中…</text></svg>'">
    <div class="name">${val.name}</div>
    <div class="desc">${val.action}</div>
    <div class="meta">${val.frames} 帧 · 周期 ${val.cycle}s</div>
  `;
  card.style.cursor = 'pointer';
  card.onclick = () => { selectStyle(key); };
  galleryGrid.appendChild(card);
});

// Sprite cards
Object.entries(PRESETS).forEach(([key, val]) => {
  const card = document.createElement('div');
  card.className = 'sprite-card';
  card.dataset.key = key;
  card.innerHTML = `
    <img src="${SPRITE_DIR}${val.file}" alt="${val.name}"
         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22><rect fill=%22%23333%22 width=%2260%22 height=%2260%22/><text x=%2230%22 y=%2235%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%228%22>…</text></svg>'">
    <div class="name">${val.name}</div>
    <div class="action">${val.action}</div>
  `;
  card.onclick = () => selectStyle(key);
  // Insert before the controls
  document.querySelector('.controls').after(card);
});

function selectStyle(key) {
  currentStyle = key;
  styleSelect.value = key;
  document.querySelectorAll('.sprite-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.sprite-card[data-key="${key}"]`);
  if (card) card.classList.add('active');
  loadSprite();
  showStrip();
  if (isPlaying) { stopAnimation(); startAnimation(); }
}

function loadSprite() {
  const preset = PRESETS[currentStyle];
  if (!preset) return;
  const totalW = preset.frames * 60;
  dancer.style.backgroundImage = `url("${SPRITE_DIR}${preset.file}")`;
  dancer.style.backgroundSize = `${totalW}px 60px`;
  frameCount.textContent = preset.frames;
  cycleTime.textContent = preset.cycle + 's';
  fpsDisplay.textContent = (preset.frames / preset.cycle).toFixed(1);
}

function showStrip() {
  const preset = PRESETS[currentStyle];
  if (!preset) return;
  stripContainer.innerHTML = '';
  for (let i = 0; i < preset.frames; i++) {
    const div = document.createElement('div');
    div.style.cssText = 'display:flex; flex-direction:column; align-items:center;';
    const img = document.createElement('img');
    img.src = `${SPRITE_DIR}${preset.file}`;
    img.style.objectFit = 'none';
    img.style.objectPosition = `-${i * 60}px 0`;
    img.style.width = '60px';
    img.style.height = '60px';
    img.alt = `Frame ${i+1}`;
    const label = document.createElement('div');
    label.className = 'frame-label';
    label.textContent = `${i+1}`;
    div.appendChild(img);
    div.appendChild(label);
    stripContainer.appendChild(div);
  }
}

function animate(timestamp) {
  if (!startTime) startTime = timestamp;
  const elapsed = (timestamp - startTime) / 1000 * speed;
  const t = elapsed % TOTAL_DUR;
  const progress = t / TOTAL_DUR;

  // Progress bar
  progressFill.style.width = `${progress * 100}%`;
  progressLabel.textContent = `${Math.round(progress * 100)}%`;
  timeDisplay.textContent = t.toFixed(1);

  // Sprite position along progress bar
  const track = document.querySelector('.progress-area');
  const trackW = track ? track.offsetWidth - 60 : 500;
  const px = progress * trackW;
  dancer.style.left = `${px}px`;

  // Sprite frame cycling (synced with progress speed)
  const preset = PRESETS[currentStyle];
  if (preset) {
    const cycleDur = preset.cycle / speed;
    const fi = Math.floor((t % cycleDur) / cycleDur * preset.frames) % preset.frames;
    dancer.style.backgroundPosition = `-${fi * 60}px 0px`;
  }

  animFrame = requestAnimationFrame(animate);
}

function startAnimation() {
  isPlaying = true;
  startTime = null;
  document.getElementById('playBtn').textContent = '⏸ 暂停';
  animate(performance.now());
}

function stopAnimation() {
  isPlaying = false;
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  document.getElementById('playBtn').textContent = '▶ 播放';
}

// Controls
document.getElementById('playBtn').onclick = () => {
  isPlaying ? stopAnimation() : startAnimation();
};
document.getElementById('resetBtn').onclick = () => {
  stopAnimation();
  progressFill.style.width = '0%';
  progressLabel.textContent = '0%';
  timeDisplay.textContent = '0.0s';
  dancer.style.left = '-30px';
  dancer.style.backgroundPosition = '0px 0px';
  startTime = null;
};

speedSlider.oninput = () => {
  speed = parseFloat(speedSlider.value);
  speedLabel.textContent = `${speed}×`;
};

// Init
selectStyle('boy');
showStrip();

// Auto-reload for images that may still be generating
setInterval(() => {
  document.querySelectorAll('.gallery-card img, .sprite-card img, #stripContainer img').forEach(img => {
    const src = img.src;
    if (src && (src.includes('sprite_') || src.includes('runner'))) {
      // Force re-check if image failed to load
      if (img.complete && img.naturalWidth === 0) {
        img.src = src.split('?')[0] + '?t=' + Date.now();
      }
    }
  });
}, 5000);

console.log('🏃 Sprite Preview loaded! Select a sprite and click Play.');
</script>
</body>
</html>
