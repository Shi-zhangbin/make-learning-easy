name: talk-show
display_name: 脱口秀 (程序员搞笑风)
description: Energetic comic style for programmer standup — bright, punchy, high contrast
colors:
  primary: '#FF6B35'
  primary_active: '#E55A28'
  primary_disabled: '#FFD9C5'
  accent_blue: '#00C4FF'
  accent_blue_active: '#00A8D6'
  accent_green: '#00E676'
  ink: '#1A1A2E'
  body: '#3D3D4A'
  body_strong: '#2A2A3A'
  muted: '#7A7A8A'
  muted_soft: '#A0A0B0'
  hairline: '#E8E8EE'
  hairline_soft: '#F2F2F6'
  canvas: '#F0F2F5'
  surface_soft: '#F8F9FB'
  surface_card: '#FFFFFF'
  surface_dark: '#1E2029'
  surface_dark_elevated: '#161822'
  surface_dark_soft: '#2A2D3A'
  on_primary: '#FFFFFF'
  on_dark: '#F5F6F7'
  on_dark_soft: '#B0B8C2'
  accent_teal: '#32C5FF'
  accent_amber: '#FFB300'
  accent_purple: '#B388FF'
  success: '#00E676'
  warning: '#FF9100'
  error: '#FF5252'
  code_bg: '#1A1C2E'
  code_text: '#C0CAF5'
typography:
  display_family: '"Noto Sans SC", -apple-system, sans-serif'
  body_family: '"Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif'
  code_family: '"JetBrains Mono", "Fira Code", monospace'
  display_xl:
    size: 80px
    weight: 800
    line_height: 1.05
    letter_spacing: -1px
  display_lg:
    size: 64px
    weight: 700
    line_height: 1.1
    letter_spacing: -0.5px
  display_md:
    size: 48px
    weight: 700
    line_height: 1.15
    letter_spacing: -0.3px
  display_sm:
    size: 34px
    weight: 700
    line_height: 1.2
    letter_spacing: 0
  title_lg:
    size: 26px
    weight: 600
    line_height: 1.3
    letter_spacing: 0
  title_md:
    size: 22px
    weight: 600
    line_height: 1.4
    letter_spacing: 0
  title_sm:
    size: 18px
    weight: 600
    line_height: 1.4
    letter_spacing: 0
  body_md:
    size: 18px
    weight: 400
    line_height: 1.6
    letter_spacing: 0
  body_sm:
    size: 16px
    weight: 400
    line_height: 1.6
    letter_spacing: 0
  caption:
    size: 14px
    weight: 500
    line_height: 1.4
    letter_spacing: 0
  caption_uppercase:
    size: 12px
    weight: 600
    line_height: 1.4
    letter_spacing: 2px
  code:
    size: 15px
    weight: 400
    line_height: 1.6
    letter_spacing: 0
rounded:
  xs: 4px
  sm: 8px
  md: 12px
  lg: 16px
  xl: 20px
  pill: 9999px
spacing:
  xxs: 4px
  xs: 8px
  sm: 12px
  md: 16px
  lg: 24px
  xl: 32px
  xxl: 48px
  section: 96px
components:
  button_primary:
    bg: '{colors.primary}'
    text: '{colors.on_primary}'
    radius: '{rounded.pill}'
    padding: 12px 28px
    height: 40px
    font: '{typography.body_sm.size}/{typography.body_sm.line_height} {typography.body_family}'
    weight: 500
  button_secondary:
    bg: '{colors.surface_card}'
    text: '{colors.primary}'
    radius: '{rounded.pill}'
    padding: 12px 28px
    height: 40px
    border: 1.5px solid {colors.primary}
  card_feature:
    bg: '{colors.surface_card}'
    text: '{colors.ink}'
    radius: '{rounded.lg}'
    padding: '{spacing.xl}'
    border: 1px solid {colors.hairline}
    shadow: 0 2px 12px rgba(0,0,0,0.06)
  card_dark:
    bg: '{colors.surface_dark}'
    text: '{colors.on_dark}'
    radius: '{rounded.lg}'
    padding: '{spacing.xl}'
  card_code:
    bg: '{colors.code_bg}'
    text: '{colors.code_text}'
    radius: '{rounded.lg}'
    padding: '{spacing.lg}'
    border: 1px solid {colors.hairline}
  badge:
    bg: '{colors.primary}'
    text: '{colors.on_primary}'
    radius: '{rounded.sm}'
    padding: 4px 14px
    font_size: '{typography.caption.size}'
    weight: 600
  badge_accent:
    bg: '{colors.accent_blue}'
    text: '{colors.on_primary}'
    radius: '{rounded.sm}'
    padding: 4px 14px
    font_size: '{typography.caption.size}'
    weight: 600
  page_number:
    color: '{colors.muted}'
    size: 13px
    weight: 500
layout_defaults:
  canvas_bg: '{colors.canvas}'
  content_bg: '{colors.canvas}'
  card_bg: '{colors.surface_card}'
  card_shadow: 0 2px 12px rgba(0,0,0,0.06)
  code_bg: '{colors.code_bg}'
  code_header: '#1E2030'
  code_text: '{colors.code_text}'
  text_color: '{colors.ink}'
  heading_color: '{colors.ink}'
  body_color: '{colors.body}'
  muted_color: '{colors.muted}'
  accent_color: '{colors.primary}'
  accent_secondary: '{colors.accent_blue}'
  border_color: '{colors.hairline}'
  page_number_color: '{components.page_number.color}'
  page_number_size: '{components.page_number.size}'
  font_family: '{typography.body_family}'
  code_family: '{typography.code_family}'
  heading_family: '{typography.display_family}'
  body_family: '{typography.body_family}'
  badge_bg: '{components.badge.bg}'
  badge_text: '{components.badge.text}'
  badge_alt_bg: '{components.badge_accent.bg}'
  badge_alt_text: '{components.badge_accent.text}'
